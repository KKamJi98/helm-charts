timezone: Asia/Seoul

defaultLocale: ko

existingEncryptionKeySecret: n8n-encryption-key

main:
  count: 1
  persistence:
    enabled: true
    storageClass: local-path
    size: 8Gi
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  extraEnvVars:
    N8N_HOST: n8n.kkamji.net
    N8N_PROTOCOL: https
    N8N_EDITOR_BASE_URL: https://n8n.kkamji.net
    WEBHOOK_URL: https://n8n.kkamji.net
    N8N_SECURE_COOKIE: "true"

worker:
  mode: queue
  count: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

webhook:
  mode: queue
  count: 1
  mcp:
    enabled: false

db:
  type: postgresdb

externalPostgresql:
  host: ""
  existingSecret: n8n-postgresql-auth
  existingSecretPasswordKey: password

externalRedis:
  host: n8n-valkey
  port: 6379
  database: 0

redis:
  enabled: false

postgresql:
  enabled: true
  image:
    tag: "17"
  auth:
    username: n8n
    database: n8n
    existingSecret: n8n-postgresql-auth
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      storageClass: local-path
      size: 8Gi

ingress:
  enabled: false

extraManifests:
  - apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      name: n8n-valkey
      labels:
        app.kubernetes.io/name: n8n-valkey
        app.kubernetes.io/instance: n8n
        app.kubernetes.io/component: queue
    spec:
      serviceName: n8n-valkey
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: n8n-valkey
          app.kubernetes.io/instance: n8n
      template:
        metadata:
          labels:
            app.kubernetes.io/name: n8n-valkey
            app.kubernetes.io/instance: n8n
            app.kubernetes.io/component: queue
        spec:
          containers:
            - name: valkey
              image: valkey/valkey:9.1-alpine
              imagePullPolicy: IfNotPresent
              args:
                - valkey-server
                - --appendonly
                - "yes"
                - --protected-mode
                - "no"
              ports:
                - name: redis
                  containerPort: 6379
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              readinessProbe:
                exec:
                  command:
                    - sh
                    - -c
                    - valkey-cli ping | grep PONG
                initialDelaySeconds: 5
                periodSeconds: 10
              livenessProbe:
                exec:
                  command:
                    - sh
                    - -c
                    - valkey-cli ping | grep PONG
                initialDelaySeconds: 20
                periodSeconds: 20
              volumeMounts:
                - name: data
                  mountPath: /data
      volumeClaimTemplates:
        - metadata:
            name: data
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: local-path
            resources:
              requests:
                storage: 2Gi
  - apiVersion: v1
    kind: Service
    metadata:
      name: n8n-valkey
      labels:
        app.kubernetes.io/name: n8n-valkey
        app.kubernetes.io/instance: n8n
        app.kubernetes.io/component: queue
    spec:
      type: ClusterIP
      ports:
        - name: redis
          port: 6379
          targetPort: redis
      selector:
        app.kubernetes.io/name: n8n-valkey
        app.kubernetes.io/instance: n8n
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: n8n
    spec:
      hostnames:
        - n8n.kkamji.net
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: kkamji
          namespace: envoy-gateway-system
          sectionName: https
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - group: ""
              kind: Service
              name: n8n
              port: 5678
              weight: 1

serviceMonitor:
  enabled: false
