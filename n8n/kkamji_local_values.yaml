timezone: Asia/Seoul

defaultLocale: ko

existingEncryptionKeySecret: n8n-encryption-key

main:
  count: 1
  persistence:
    enabled: true
    storageClass: local-path
    size: 8Gi
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  extraEnvVars:
    N8N_HOST: n8n.kkamji.net
    N8N_PROTOCOL: https
    N8N_EDITOR_BASE_URL: https://n8n.kkamji.net
    WEBHOOK_URL: https://n8n.kkamji.net
    N8N_SECURE_COOKIE: "true"

worker:
  mode: regular

webhook:
  mode: regular

db:
  type: postgresdb

postgresql:
  enabled: true
  image:
    tag: "18.4.0"
  auth:
    username: n8n
    database: n8n
    existingSecret: n8n-postgresql-auth
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      storageClass: local-path
      size: 8Gi

ingress:
  enabled: false

extraManifests:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: n8n
    spec:
      hostnames:
        - n8n.kkamji.net
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: kkamji
          namespace: envoy-gateway-system
          sectionName: https
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - group: ""
              kind: Service
              name: n8n
              port: 5678
              weight: 1

serviceMonitor:
  enabled: false
