{{- if .Values.secret.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := .Values.secret.data }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end }}
{{- if and (or (eq (.Values.gateway.auth.mode | default "token") "token") (eq .Values.gateway.auth.mode "password")) (not .Values.gateway.auth.existingSecretName) .Values.gateway.auth.generateSecret }}
{{- $secretName := include "openclaw.gatewayAuthSecretName" . -}}
{{- $secretKey := include "openclaw.gatewayAuthSecretKey" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingValue := "" -}}
{{- if $existing }}
{{- $existingValue = (index $existing.data $secretKey | default "") -}}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
type: Opaque
data:
  {{ $secretKey }}: {{ if $existingValue }}{{ $existingValue | quote }}{{ else }}{{ randAlphaNum 32 | b64enc | quote }}{{ end }}
{{- end }}
