apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openclaw.fullname" . }}-config
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
data:
  openclaw.json5: |
    {
      {{- if .Values.gateway }}
      "gateway": {
        "bind": "{{ .Values.gateway.bind | default "lan" }}"
      },
      {{- end }}
      {{- if .Values.agents }}
      "agents": {
        {{- $agentList := list }}
        {{- range $name, $agent := .Values.agents }}
        {{- $agentList = append $agentList (printf "\"%s\": { \"model\": \"%s\" }" $name $agent.model) }}
        {{- end }}
        {{ join ",\n        " $agentList }}
      }
      {{- end }}
    }
  {{- range $key, $value := .Values.config }}
  {{ $key }}: |
{{ $value | indent 4 }}
  {{- end }}
