{{/*
hubble-ui 의 HTTPRoute - 앱 차트(umbrella)가 자기 라우팅을 소유한다.
upstream cilium chart 는 Gateway API route 를 지원하지 않으므로 wrapper
템플릿으로 정의한다. group/kind/weight 는 API server defaulting 과 일치시켜
ArgoCD diff 를 방지. basic auth 는 templates/security-policy.yaml.
*/}}
{{- $root := . }}
{{- range $name, $r := .Values.gatewayRoutes }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $name }}
  namespace: {{ $root.Release.Namespace }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $root.Values.gatewayRef.name }}
      namespace: {{ $root.Values.gatewayRef.namespace }}
      sectionName: {{ $root.Values.gatewayRef.sectionName }}
  hostnames:
    - {{ $r.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ $r.backend.name }}
          port: {{ $r.backend.port }}
          weight: 1
{{- end }}
