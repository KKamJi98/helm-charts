# Envoy Gateway (Gateway API) - 플랫폼 계층.
#
# 역할 분리 (Gateway API persona model):
#   - 이 차트(플랫폼): GatewayClass, Gateway(wildcard listener/TLS/IP), redirect,
#     wildcard Certificate. 신규 서비스는 리스너 변경 없이 HTTPRoute 만 붙인다.
#   - 각 앱 차트: 자기 HTTPRoute 소유 (kube-prometheus-stack route.main,
#     play-hub repo 의 chart 등)
#   - 예외(플랫폼이 대신 보유): 소유 차트가 Gateway API 를 지원하지 않는 경우만
#     (hubble-ui <- cilium chart 미지원, argocd TLSRoute <- argo-cd chart 미지원)

gateway-helm: {}

gateway:
  name: kkamji
  className: envoy
  # Windows host portproxy(80/443) 타깃
  lbIP: 10.0.1.100
  externalDNSTarget: 121.130.214.237
  issuer: letsencrypt-prod
  wildcardHost: "*.kkamji.net"

# 소유 차트가 Gateway API 를 지원하지 않아 플랫폼이 보유하는 라우트
platformRoutes:
  - name: hubble
    namespace: kube-system
    host: hubble.kkamji.net
    backend: { name: hubble-ui, port: 80 }
    basicAuth: true

# argocd 는 pod 가 직접 TLS 종료 -> TLSRoute (argo-cd chart 가 미지원이라 플랫폼 보유)
tlsPassthrough:
  - name: argocd
    namespace: argocd
    host: argocd.kkamji.net
    backend: { name: argocd-server, port: 443 }
