# Envoy Gateway (Gateway API) - 플랫폼 계층.
#
# 역할 분리 (Gateway API persona model):
#   - 이 차트(플랫폼): GatewayClass, Gateway(wildcard listener/TLS/IP),
#     https 리다이렉트, wildcard Certificate 만 소유한다.
#   - HTTPRoute/TLSRoute 는 전부 각 앱 차트가 소유한다:
#       kube-prometheus-stack: templates/gateway-routes.yaml (grafana/prom/am)
#       cilium:                templates/gateway-routes.yaml (hubble)
#       argocd:                templates/gateway-route.yaml  (TLSRoute)
#       play-hub repo:         templates/httproute.yaml
#   - 신규 서비스 온보딩 = 자기 차트에 HTTPRoute 추가
#     (parentRef {name: kkamji, namespace: envoy-gateway-system, sectionName: https})

gateway-helm: {}

gateway:
  name: kkamji
  className: envoy
  # Windows host portproxy(80/443) 타깃
  lbIP: 10.0.1.100
  externalDNSTarget: 121.130.214.237
  issuer: letsencrypt-prod
  wildcardHost: "*.kkamji.net"

# TLS passthrough 전용 리스너 (pod 가 직접 TLS 종료하는 서비스).
# 리스너는 플랫폼 소유, TLSRoute 는 해당 앱 차트 소유.
tlsPassthroughListeners:
  - name: argocd
    host: argocd.kkamji.net
