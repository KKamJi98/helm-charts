{{/*
플랫폼 예외 라우트의 basic auth. 앱 차트가 소유한 라우트의 SecurityPolicy 는
해당 앱 차트(예: charts/kube-prometheus-stack/templates/securitypolicies.yaml)가
정의한다. secret 의 .htpasswd 키는 {SHA} 형식만 지원.
*/}}
{{- range .Values.platformRoutes }}
{{- if .basicAuth }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ .name }}-basic-auth
  namespace: {{ .namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ .name }}
  basicAuth:
    users:
      name: basic-auth
{{- end }}
{{- end }}
