{{- $root := . }}
{{- range .Values.routes }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}
  namespace: {{ .namespace }}
  annotations:
    external-dns.alpha.kubernetes.io/target: {{ $root.Values.gateway.externalDNSTarget | quote }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $root.Values.gateway.name }}
      namespace: {{ $root.Release.Namespace }}
      sectionName: https-{{ .name }}
  hostnames:
    - {{ .host | quote }}
  rules:
{{- range .extraMatches }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ .path }}
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .backend.name }}
          port: {{ .backend.port }}
          weight: 1
{{- end }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .backend.name }}
          port: {{ .backend.port }}
          weight: 1
{{- end }}
{{- range .Values.tlsPassthrough }}
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: {{ .name }}
  namespace: {{ .namespace }}
  annotations:
    external-dns.alpha.kubernetes.io/target: {{ $root.Values.gateway.externalDNSTarget | quote }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $root.Values.gateway.name }}
      namespace: {{ $root.Release.Namespace }}
      sectionName: tls-{{ .name }}
  hostnames:
    - {{ .host | quote }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ .backend.name }}
          port: {{ .backend.port }}
          weight: 1
{{- end }}
