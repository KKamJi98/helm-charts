{{/*
플랫폼 예외 라우트만 여기서 정의한다 (소유 차트가 Gateway API 미지원).
일반 원칙: HTTPRoute 는 각 앱 차트가 소유한다 - kube-prometheus-stack 의
route.main, play-hub repo 의 chart 등. 신규 서비스는 자기 차트에서
parentRef {name: kkamji, namespace: envoy-gateway-system, sectionName: https}
로 붙인다.
*/}}
{{- $root := . }}
{{- range .Values.platformRoutes }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}
  namespace: {{ .namespace }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $root.Values.gateway.name }}
      namespace: {{ $root.Release.Namespace }}
      sectionName: https
  hostnames:
    - {{ .host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .backend.name }}
          port: {{ .backend.port }}
          weight: 1
{{- end }}
{{- range .Values.tlsPassthrough }}
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: {{ .name }}
  namespace: {{ .namespace }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $root.Values.gateway.name }}
      namespace: {{ $root.Release.Namespace }}
      sectionName: tls-{{ .name }}
  hostnames:
    - {{ .host | quote }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ .backend.name }}
          port: {{ .backend.port }}
          weight: 1
{{- end }}
