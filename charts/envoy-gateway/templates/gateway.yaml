apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.gateway.className }}
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
# wildcard 인증서 (DNS-01). 신규 서비스가 리스너/인증서 추가 없이 온보딩된다.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-kkamji-net
  namespace: {{ .Release.Namespace }}
spec:
  secretName: wildcard-kkamji-net-tls
  issuerRef:
    name: {{ .Values.gateway.issuer }}
    kind: ClusterIssuer
    group: cert-manager.io
  dnsNames:
    - {{ .Values.gateway.wildcardHost | quote }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    # external-dns 는 gateway 소스에서 route 가 아닌 Gateway 의 target 을 본다.
    # 누락 시 내부 LB IP(10.0.1.100)가 A 레코드로 들어가 외부 접근이 끊긴다.
    external-dns.alpha.kubernetes.io/target: {{ .Values.gateway.externalDNSTarget | quote }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  infrastructure:
    annotations:
      # Windows host portproxy 가 바라보는 IP 를 MetalLB 에서 고정
      metallb.io/loadBalancerIPs: {{ .Values.gateway.lbIP | quote }}
  listeners:
    # HTTP: https 리다이렉트 용
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    # 모든 HTTPS 트래픽을 받는 wildcard 리스너. 앱 차트의 HTTPRoute 는
    # sectionName: https 로 붙는다.
    - name: https
      protocol: HTTPS
      port: 443
      hostname: {{ .Values.gateway.wildcardHost | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: wildcard-kkamji-net-tls
      allowedRoutes:
        namespaces:
          from: All
{{- range .Values.tlsPassthroughListeners }}
    # SNI 가 정확히 일치하는 호스트는 wildcard 보다 우선 매칭된다 (passthrough).
    # TLSRoute 는 해당 앱 차트가 sectionName: tls-{{ .name }} 으로 붙인다.
    - name: tls-{{ .name }}
      protocol: TLS
      port: 443
      hostname: {{ .host | quote }}
      tls:
        mode: Passthrough
      allowedRoutes:
        namespaces:
          from: All
{{- end }}
---
# 80 포트 전역 https 리다이렉트
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: https-redirect
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gateway.name }}
      namespace: {{ .Release.Namespace }}
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
