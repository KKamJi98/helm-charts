apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.gateway.className }}
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    # gateway-shim: HTTPS listener 별 Certificate 를 이 네임스페이스에 자동 생성
    cert-manager.io/cluster-issuer: {{ .Values.gateway.issuer }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  infrastructure:
    annotations:
      # Windows host portproxy 가 바라보는 IP 를 MetalLB 에서 고정
      metallb.io/loadBalancerIPs: {{ .Values.gateway.lbIP | quote }}
  listeners:
    # HTTP: https 리다이렉트 + cert-manager HTTP-01 solver 용
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
{{- range .Values.routes }}
    - name: https-{{ .name }}
      protocol: HTTPS
      port: 443
      hostname: {{ .host | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          # group/kind 는 API server defaulting 과 일치시켜 ArgoCD diff 를 방지
          - group: ""
            kind: Secret
            name: {{ .name }}-kkamji-net-tls
      allowedRoutes:
        namespaces:
          from: All
{{- end }}
{{- range .Values.tlsPassthrough }}
    - name: tls-{{ .name }}
      protocol: TLS
      port: 443
      hostname: {{ .host | quote }}
      tls:
        mode: Passthrough
      allowedRoutes:
        namespaces:
          from: All
{{- end }}
---
# 80 포트 전역 https 리다이렉트. cert-manager solver HTTPRoute 가
# /.well-known/acme-challenge 경로를 더 구체적으로 매칭하므로 충돌 없음.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: https-redirect
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gateway.name }}
      namespace: {{ .Release.Namespace }}
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
