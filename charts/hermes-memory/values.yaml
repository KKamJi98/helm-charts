# Defaults for the Hermes shared memory backend umbrella chart.
# Runtime overrides for kkamji-lab live in kkamji_local_values.yaml.

secretStoreRef:
  name: parameter-store
  kind: ClusterSecretStore

ssm:
  basePath: /kkamji/hermes/mem0

auth:
  # Best practice target is ESO/SSM. The generated fallback exists because this
  # cluster currently has no AWS credentials available to Hermes for SSM writes.
  # ArgoCD ignores Secret data drift for this generated Secret in the Application.
  generatedSecret:
    enabled: true
  externalSecret:
    enabled: false
    refreshInterval: 1h
  secretName: hermes-memory-qdrant-auth
  qdrantSecretKey: hermes
  securityPolicyClientID: hermes
  requestHeaders:
    - api-key
    - x-api-key

gatewayRef:
  name: kkamji
  namespace: envoy-gateway-system
  sectionName: https

httpRoute:
  enabled: true
  name: hermes-memory
  host: memory.kkamji.net
  service:
    name: hermes-memory-qdrant
    port: 6333

securityPolicy:
  enabled: true
  name: hermes-memory-api-key
  sanitize: false
  forwardClientIDHeader: x-hermes-memory-client-id

networkPolicy:
  enabled: true
  envoyGatewayNamespace: envoy-gateway-system

qdrant:
  enabled: true
  fullnameOverride: hermes-memory-qdrant
  replicaCount: 1
  image:
    repository: docker.io/qdrant/qdrant
    tag: "v1.18.2"
    pullPolicy: IfNotPresent
    useUnprivilegedImage: true
  service:
    type: ClusterIP
    ports:
      - name: http
        port: 6333
        targetPort: 6333
        protocol: TCP
        checksEnabled: true
      - name: grpc
        port: 6334
        targetPort: 6334
        protocol: TCP
        checksEnabled: false
      - name: p2p
        port: 6335
        targetPort: 6335
        protocol: TCP
        checksEnabled: false
  env:
    - name: QDRANT__SERVICE__API_KEY
      valueFrom:
        secretKeyRef:
          name: hermes-memory-qdrant-auth
          key: hermes
  config:
    cluster:
      enabled: false
    service:
      host: 0.0.0.0
      http_port: 6333
      grpc_port: 6334
      enable_tls: false
  persistence:
    accessModes:
      - ReadWriteOnce
    size: 8Gi
    storageClassName: local-path
  snapshotPersistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 8Gi
    storageClassName: local-path
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: true
  metrics:
    serviceMonitor:
      enabled: false
