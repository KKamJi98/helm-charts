{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-memory-qdrant
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: qdrant
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.envoyGatewayNamespace | quote }}
          podSelector:
            matchLabels:
              gateway.envoyproxy.io/owning-gateway-name: {{ .Values.gatewayRef.name | quote }}
              gateway.envoyproxy.io/owning-gateway-namespace: {{ .Values.gatewayRef.namespace | quote }}
      ports:
        - protocol: TCP
          port: 6333
  egress:
    # DNS for Kubernetes service discovery and any future remote endpoints.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
