{{- if .Values.auth.generatedSecret.enabled }}
{{- $name := .Values.auth.secretName -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $apiKeyB64 := "" -}}
{{- if and $existing $existing.data (index $existing.data .Values.auth.qdrantEnvKey) -}}
{{- $apiKeyB64 = index $existing.data .Values.auth.qdrantEnvKey -}}
{{- else -}}
{{- $apiKeyB64 = randAlphaNum 48 | b64enc -}}
{{- end -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
  labels:
    app.kubernetes.io/name: hermes-memory
    app.kubernetes.io/component: auth
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
type: Opaque
data:
  {{ .Values.auth.qdrantEnvKey }}: {{ $apiKeyB64 | quote }}
  {{ .Values.auth.securityPolicyClientID }}: {{ $apiKeyB64 | quote }}
{{- end }}
