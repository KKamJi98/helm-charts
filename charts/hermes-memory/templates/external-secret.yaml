{{- if .Values.auth.externalSecret.enabled }}
{{- $store := .Values.secretStoreRef -}}
{{- $base := trimSuffix "/" .Values.ssm.basePath -}}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.auth.secretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  refreshInterval: {{ .Values.auth.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ $store.name }}
    kind: {{ $store.kind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.auth.secretName }}
    creationPolicy: Owner
    template:
      data:
        {{ .Values.auth.qdrantSecretKey }}: '{{ "{{ .apiKey }}" }}'
  data:
    - secretKey: apiKey
      remoteRef:
        key: {{ printf "%s/qdrant-api-key" $base }}
{{- end }}
