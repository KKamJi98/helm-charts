# kkamji homelab override for the Hermes shared memory backend.
# Hermes mem0 OSS runs in-process inside each Hermes instance; this chart
# provides the shared Qdrant vector store reachable by herwin and hermac.

secretStoreRef:
  name: parameter-store
  kind: ClusterSecretStore

ssm:
  basePath: /kkamji/hermes/mem0

auth:
  generatedSecret:
    # Temporary bootstrap path: no AWS credentials are available in this Hermes
    # session to create SSM SecureString parameters. The generated secret is not
    # stored in Git and ArgoCD ignores data drift for this Secret.
    # Migration target: set this false, externalSecret.enabled true, and store
    # /kkamji/hermes/mem0/qdrant-api-key in SSM SecureString.
    enabled: true
  externalSecret:
    enabled: false
    refreshInterval: 1h
  secretName: hermes-memory-qdrant-auth
  qdrantSecretKey: hermes
  securityPolicyClientID: hermes
  requestHeaders:
    - api-key
    - x-api-key

gatewayRef:
  name: kkamji
  namespace: envoy-gateway-system
  sectionName: https

httpRoute:
  enabled: true
  name: hermes-memory
  host: memory.kkamji.net
  service:
    name: hermes-memory-qdrant
    port: 6333

securityPolicy:
  enabled: true
  name: hermes-memory-api-key
  sanitize: false
  forwardClientIDHeader: x-hermes-memory-client-id

networkPolicy:
  enabled: true
  envoyGatewayNamespace: envoy-gateway-system

qdrant:
  enabled: true
  fullnameOverride: hermes-memory-qdrant
  replicaCount: 1
  image:
    repository: docker.io/qdrant/qdrant
    tag: "v1.18.2"
    pullPolicy: IfNotPresent
    useUnprivilegedImage: true
  persistence:
    enabled: true
    storageClassName: local-path
    size: 8Gi
  snapshotPersistence:
    enabled: true
    storageClassName: local-path
    size: 8Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
