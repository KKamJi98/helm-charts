kube-prometheus-stack:
  alertmanager:
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/auth-type: "basic"
        nginx.ingress.kubernetes.io/auth-secret: "basic-auth"
        nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
        external-dns.alpha.kubernetes.io/target: 121.130.214.237
      hosts:
        - alertmanager.kkamji.net
      paths:
        - /
      tls:
        - secretName: alertmanager-tls
          hosts:
            - alertmanager.kkamji.net
    alertmanagerSpec:
      # ESO 가 SSM 의 Slack bot token 을 monitoring ns 의
      # alertmanager-slack Secret(key: bot-token) 으로 sync → 아래 경로로 mount.
      secrets:
        - alertmanager-slack
    config:
      global:
        # 1m 은 Prometheus resend 주기와 너무 근접해 flap 시 resolved 누락 여지가 있어
        # 기본값(5m)으로 복원.
        resolve_timeout: 5m
      templates:
        - "/etc/alertmanager/config/*.tmpl"
      route:
        # critical / warning 외 나머지(info 등)는 null 로 드롭
        receiver: "null"
        group_by: ["alertname", "namespace", "severity"]
        group_wait: 10s
        group_interval: 1m
        repeat_interval: 15m
        routes:
          # 예외 라우트는 severity 분기보다 먼저 평가되어야 한다 (first-match).
          # Watchdog 예외처리
          - receiver: "null"
            matchers:
              - alertname = "Watchdog"
          # API server 버전 낮음, 임시 예외처리
          - receiver: "null"
            matchers:
              - alertname = "KubeVersionMismatch"
          # severity 기반 채널 분기
          - receiver: "slack-critical"
            matchers:
              - severity = "critical"
          - receiver: "slack-warning"
            matchers:
              - severity = "warning"
      receivers:
        - name: "null"
        # bot token(chat.postMessage)으로 채널 분기. 봇이 각 채널에 초대돼 있어야 한다.
        - name: "slack-critical"
          slack_configs:
            - api_url: "https://slack.com/api/chat.postMessage"
              channel: "C0B8URUE5J6"  # 00_monitor-critical (채널 ID - rename 무관)
              send_resolved: true
              title: '{{ template "slack.kkamji.title" . }}'
              text: '{{ template "slack.kkamji.text" . }}'
              color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
              http_config:
                authorization:
                  type: Bearer
                  credentials_file: /etc/alertmanager/secrets/alertmanager-slack/bot-token
        - name: "slack-warning"
          slack_configs:
            - api_url: "https://slack.com/api/chat.postMessage"
              channel: "C0B8RBKCT45"  # 00_monitor-warning (채널 ID - rename 무관)
              send_resolved: true
              title: '{{ template "slack.kkamji.title" . }}'
              text: '{{ template "slack.kkamji.text" . }}'
              color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
              http_config:
                authorization:
                  type: Bearer
                  credentials_file: /etc/alertmanager/secrets/alertmanager-slack/bot-token
    # Slack 메시지 커스텀 템플릿. secret 에 .tmpl 로 들어가 config.templates 가 로드한다.
    templateFiles:
      kkamji-slack.tmpl: |-
        {{ define "slack.kkamji.title" -}}
        {{ if eq .Status "firing" }}:rotating_light: [FIRING:{{ .Alerts.Firing | len }}]{{ else }}:white_check_mark: [RESOLVED]{{ end }} {{ .CommonLabels.alertname }}{{ if .CommonLabels.namespace }} ({{ .CommonLabels.namespace }}){{ end }}
        {{- end }}

        {{ define "slack.kkamji.text" -}}
        {{ range .Alerts -}}
        {{ if eq .Status "firing" }}:small_red_triangle: *Firing*{{ else }}:large_green_circle: *Resolved*{{ end }} `{{ .Labels.severity }}` *{{ .Labels.alertname }}*
        {{- if .Annotations.summary }}
        {{ .Annotations.summary }}{{ end }}
        {{- if and .Annotations.description (ne .Annotations.description .Annotations.summary) }}
        {{ .Annotations.description }}{{ end }}
        {{- if .Labels.pod }}
        Target: `{{ .Labels.namespace }}/{{ .Labels.pod }}`
        {{- else if .Labels.instance }}
        Target: `{{ .Labels.instance }}`{{ if .Labels.job }} (job `{{ .Labels.job }}`){{ end }}
        {{- else if .Labels.job }}
        Target: job `{{ .Labels.job }}`{{ if .Labels.service }} / svc `{{ .Labels.service }}`{{ end }}{{ if .Labels.namespace }} in `{{ .Labels.namespace }}`{{ end }}
        {{- else if .Labels.namespace }}
        Namespace: `{{ .Labels.namespace }}`{{ end }}
        Started: {{ .StartsAt.Format "01-02 15:04 UTC" }}{{ if eq .Status "resolved" }} / Ended: {{ .EndsAt.Format "01-02 15:04 UTC" }}{{ end }}
        {{- if .Annotations.runbook_url }}
        <{{ .Annotations.runbook_url }}|Runbook>{{ end }}

        {{ end }}
        {{- end }}
  grafana:
    admin:
      existingSecret: grafana-auth
      userKey: admin-user
      passwordKey: admin-password
    defaultDashboardsTimezone: browser # TimeZone 설정 (default: UTC)
    ingress:
      ingressClassName: nginx
      enabled: true
      annotations:
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/target: 121.130.214.237
      hosts:
        - grafana.kkamji.net
      path: /
      pathType: Prefix
      tls:
        - secretName: grafana-tls
          hosts:
            - grafana.kkamji.net
    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki-gateway:80
        jsonData:
          timeout: 60
          maxLines: 1000
          httpHeaderName1: "X-Scope-OrgID"
        secureJsonData:
          httpHeaderValue1: "kube-rca"
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo.monitoring.svc.cluster.local:3200
        jsonData:
          httpMethod: GET
          serviceMap:
            datasourceUid: Prometheus
    sidecar:
      datasources:
        exemplarTraceIdDestinations:
          datasourceUid: tempo
          traceIdLabelName: trace_id
          urlDisplayLabel: View Trace
      dashboards:
        folderAnnotation: "grafana_folder"
        defaultFolderName: "Default Dashboard"
        provider:
          foldersFromFilesStructure: true
  prometheus:
    prometheusSpec:
      enableRemoteWriteReceiver: true
      additionalScrapeConfigs:
        # Hubble & Cilium Metric 수집을 위한 설정
        - job_name: "kubernetes-pods" ## Cilium
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: true
            - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: ${1}:${2}
              target_label: __address__
        - job_name: "kubernetes-endpoints" ## Hubble
          scrape_interval: 30s
          kubernetes_sd_configs:
            - role: endpoints
          relabel_configs:
            - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
              action: keep
              regex: true
            - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
              action: replace
              target_label: __address__
              regex: (.+)(?::\d+);(\d+)
              replacement: $1:$2
        # Istio Envoy sidecar metrics
        - job_name: "envoy-stats"
          metrics_path: /stats/prometheus
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_container_port_name]
              action: keep
              regex: ".*-envoy-prom"
            - action: labelmap
              regex: __meta_kubernetes_pod_label_(.+)
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: pod
        # Istiod control plane metrics
        - job_name: "istiod"
          kubernetes_sd_configs:
            - role: endpoints
              namespaces:
                names:
                  - istio-system
          relabel_configs:
            - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
              action: keep
              regex: istiod;http-monitoring
            - action: labelmap
              regex: __meta_kubernetes_pod_label_(.+)
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: pod
      retention: 14d
    ingress:
      ingressClassName: nginx
      enabled: true
      annotations:
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/auth-type: "basic" # 인증 타입
        nginx.ingress.kubernetes.io/auth-secret: "basic-auth" # 인증에 사용할 secret
        nginx.ingress.kubernetes.io/auth-realm: "Authentication Required" # 인증 프롬프트에 보내는 메시지
        external-dns.alpha.kubernetes.io/target: 121.130.214.237
      hosts:
        - prometheus.kkamji.net
      paths:
        - /
      tls:
        - secretName: prometheus-tls
          hosts:
            - prometheus.kkamji.net
  # CrashLoopBackOff 전용 알람을 복원한다 (이전에 disabled 였으나, pod 단위
  # crashloop 신호가 없으면 KubePodNotReady 등 간접 알람만 남아 추적이 어렵다).
  defaultRules: {}

  # Cilium kubeProxyReplacement 환경 - kube-proxy 가 없으므로 scrape 대상과
  # KubeProxyDown 룰 자체를 생성하지 않는다 (영구 firing 노이즈 제거).
  kubeProxy:
    enabled: false

basicAuth:
  ssmKey: /kkamji/monitoring/ingress/basic-auth
  # Envoy Gateway basic auth 용 {SHA} 형식 htpasswd (htpasswd -nbs 로 생성)
  shaSsmKey: /kkamji/monitoring/ingress/basic-auth-sha
  namespaces:
    - monitoring
    - kube-system

grafanaAuth:
  adminUserSsmKey: /kkamji/monitoring/grafana/admin-user
  adminPasswordSsmKey: /kkamji/monitoring/grafana/admin-password

# Alertmanager Slack bot token (personal workspace). severity 로 monitor-critical /
# monitor-warning 채널 분기. ESO 가 SSM 토큰을 monitoring ns 의 alertmanager-slack Secret 으로 sync.
alertmanagerSlack:
  ssmKey: /kkamji/monitoring/alertmanager/slack-bot-token
