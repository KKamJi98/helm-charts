kube-prometheus-stack:
  alertmanager:
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/auth-type: "basic"
        nginx.ingress.kubernetes.io/auth-secret: "basic-auth"
        nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
        external-dns.alpha.kubernetes.io/target: 121.130.214.237
      hosts:
        - alertmanager.kkamji.net
      paths:
        - /
      tls:
        - secretName: alertmanager-tls
          hosts:
            - alertmanager.kkamji.net
    alertmanagerSpec:
      # ESO 가 SSM 의 Slack bot token 을 monitoring ns 의
      # alertmanager-slack Secret(key: bot-token) 으로 sync → 아래 경로로 mount.
      secrets:
        - alertmanager-slack
    config:
      global:
        resolve_timeout: 1m
      route:
        # critical / warning 외 나머지(info 등)는 null 로 드롭
        receiver: "null"
        group_by: ["alertname", "namespace", "severity"]
        group_wait: 10s
        group_interval: 1m
        repeat_interval: 15m
        routes:
          # 예외 라우트는 severity 분기보다 먼저 평가되어야 한다 (first-match).
          # Watchdog 예외처리
          - receiver: "null"
            matchers:
              - alertname = "Watchdog"
          # Cilium 사용, kube-proxy 예외처리
          - receiver: "null"
            matchers:
              - alertname = "KubeProxyDown"
          # API server 버전 낮음, 임시 예외처리
          - receiver: "null"
            matchers:
              - alertname = "KubeVersionMismatch"
          # severity 기반 채널 분기
          - receiver: "slack-critical"
            matchers:
              - severity = "critical"
          - receiver: "slack-warning"
            matchers:
              - severity = "warning"
      receivers:
        - name: "null"
        # bot token(chat.postMessage)으로 채널 분기. 봇이 각 채널에 초대돼 있어야 한다.
        - name: "slack-critical"
          slack_configs:
            - api_url: "https://slack.com/api/chat.postMessage"
              channel: "#00_monitor-critical"
              send_resolved: true
              http_config:
                authorization:
                  type: Bearer
                  credentials_file: /etc/alertmanager/secrets/alertmanager-slack/bot-token
        - name: "slack-warning"
          slack_configs:
            - api_url: "https://slack.com/api/chat.postMessage"
              channel: "#00_monitor-warning"
              send_resolved: true
              http_config:
                authorization:
                  type: Bearer
                  credentials_file: /etc/alertmanager/secrets/alertmanager-slack/bot-token
  grafana:
    admin:
      existingSecret: grafana-auth
      userKey: admin-user
      passwordKey: admin-password
    defaultDashboardsTimezone: browser # TimeZone 설정 (default: UTC)
    ingress:
      ingressClassName: nginx
      enabled: true
      annotations:
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/target: 121.130.214.237
      hosts:
        - grafana.kkamji.net
      path: /
      pathType: Prefix
      tls:
        - secretName: grafana-tls
          hosts:
            - grafana.kkamji.net
    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki-gateway:80
        jsonData:
          timeout: 60
          maxLines: 1000
          httpHeaderName1: "X-Scope-OrgID"
        secureJsonData:
          httpHeaderValue1: "kube-rca"
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo.monitoring.svc.cluster.local:3200
        jsonData:
          httpMethod: GET
          serviceMap:
            datasourceUid: Prometheus
    sidecar:
      datasources:
        exemplarTraceIdDestinations:
          datasourceUid: tempo
          traceIdLabelName: trace_id
          urlDisplayLabel: View Trace
      dashboards:
        folderAnnotation: "grafana_folder"
        defaultFolderName: "Default Dashboard"
        provider:
          foldersFromFilesStructure: true
  prometheus:
    prometheusSpec:
      enableRemoteWriteReceiver: true
      additionalScrapeConfigs:
        # Hubble & Cilium Metric 수집을 위한 설정
        - job_name: "kubernetes-pods" ## Cilium
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: true
            - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: ${1}:${2}
              target_label: __address__
        - job_name: "kubernetes-endpoints" ## Hubble
          scrape_interval: 30s
          kubernetes_sd_configs:
            - role: endpoints
          relabel_configs:
            - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
              action: keep
              regex: true
            - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
              action: replace
              target_label: __address__
              regex: (.+)(?::\d+);(\d+)
              replacement: $1:$2
        # Istio Envoy sidecar metrics
        - job_name: "envoy-stats"
          metrics_path: /stats/prometheus
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_container_port_name]
              action: keep
              regex: ".*-envoy-prom"
            - action: labelmap
              regex: __meta_kubernetes_pod_label_(.+)
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: pod
        # Istiod control plane metrics
        - job_name: "istiod"
          kubernetes_sd_configs:
            - role: endpoints
              namespaces:
                names:
                  - istio-system
          relabel_configs:
            - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
              action: keep
              regex: istiod;http-monitoring
            - action: labelmap
              regex: __meta_kubernetes_pod_label_(.+)
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: pod
      retention: 14d
    ingress:
      ingressClassName: nginx
      enabled: true
      annotations:
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/auth-type: "basic" # 인증 타입
        nginx.ingress.kubernetes.io/auth-secret: "basic-auth" # 인증에 사용할 secret
        nginx.ingress.kubernetes.io/auth-realm: "Authentication Required" # 인증 프롬프트에 보내는 메시지
        external-dns.alpha.kubernetes.io/target: 121.130.214.237
      hosts:
        - prometheus.kkamji.net
      paths:
        - /
      tls:
        - secretName: prometheus-tls
          hosts:
            - prometheus.kkamji.net
  defaultRules:
    disabled:
      KubePodCrashLooping: true

basicAuth:
  ssmKey: /kkamji/monitoring/ingress/basic-auth
  namespaces:
    - monitoring
    - kube-system

grafanaAuth:
  adminUserSsmKey: /kkamji/monitoring/grafana/admin-user
  adminPasswordSsmKey: /kkamji/monitoring/grafana/admin-password

# Alertmanager Slack bot token (personal workspace). severity 로 monitor-critical /
# monitor-warning 채널 분기. ESO 가 SSM 토큰을 monitoring ns 의 alertmanager-slack Secret 으로 sync.
alertmanagerSlack:
  ssmKey: /kkamji/monitoring/alertmanager/slack-bot-token
