kube-prometheus-stack:
  alertmanager:
    # 외부 노출은 Envoy Gateway HTTPRoute(charts/envoy-gateway)가 담당
    alertmanagerSpec:
      # Prometheus Operator v0.83 validates Discord config before Alertmanager
      # starts and cannot parse webhook_url_file. ESO renders the complete
      # Alertmanager config with SSM values only inside the cluster.
      configSecret: alertmanager-discord-config
      # Discord 메시지의 Silence 링크(.ExternalURL)가 외부 도메인을 가리키도록 설정
      externalUrl: https://alertmanager.kkamji.net
    config:
      global:
        # 1m 은 Prometheus resend 주기와 너무 근접해 flap 시 resolved 누락 여지가 있어
        # 기본값(5m)으로 복원.
        resolve_timeout: 5m
      templates:
        - "/etc/alertmanager/config/*.tmpl"
      route:
        # critical / warning 외 나머지(info 등)는 null 로 드롭
        receiver: "null"
        group_by: ["alertname", "namespace", "severity"]
        # 동시 다발 장애가 첫 메시지에 묶이도록 30s 대기, 같은 그룹 신규 alert 는 5m 단위로 합산
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        routes:
          # 예외 라우트는 severity 분기보다 먼저 평가되어야 한다 (first-match).
          # Watchdog 예외처리
          - receiver: "null"
            matchers:
              - alertname = "Watchdog"
          # API server 버전 낮음, 임시 예외처리
          - receiver: "null"
            matchers:
              - alertname = "KubeVersionMismatch"
          # severity 기반 채널 분기. repeat 은 "리마인드 필요성" 기준으로 차등:
          # critical 1h(행동 촉구), warning 12h(기록 성격 - 15m 도배 방지)
          - receiver: "discord-critical"
            matchers:
              - severity = "critical"
            repeat_interval: 1h
          - receiver: "discord-warning"
            matchers:
              - severity = "warning"
            repeat_interval: 12h
      inhibit_rules:
        # pod 단위 원인 알람이 있으면 같은 namespace 의 집계형 TargetDown 은 중복 신호 → 억제
        - source_matchers:
            - alertname =~ "KubePodCrashLooping|KubePodNotReady|ScrapeTargetDown"
          target_matchers:
            - alertname = "TargetDown"
          equal: ["namespace"]
        # 노드가 죽었으면 그 노드 라벨이 붙은 warning 파생 알람 억제
        - source_matchers:
            - alertname = "KubeNodeNotReady"
          target_matchers:
            - severity = "warning"
          equal: ["node"]
        # 같은 알람의 critical 이 이미 발화 중이면 warning 채널 중복 발송 억제
        - source_matchers:
            - severity = "critical"
          target_matchers:
            - severity = "warning"
          equal: ["alertname", "namespace"]
      receivers:
        - name: "null"
        # Discord webhook 으로 채널 분기. 각 webhook 이 대상 채널에 바인딩돼 있다.
        # webhook_url_file 은 alertmanagerSpec.secrets 로 mount 된 파일을 읽는다.
        # embed 색상은 discord notifier 가 status(firing/resolved)로 자동 설정한다.
        - name: "discord-critical"
          discord_configs:
            - webhook_url_file: /etc/alertmanager/secrets/alertmanager-discord/critical-webhook
              send_resolved: true
              title: '{{ template "discord.kkamji.title" . }}'
              message: '{{ template "discord.kkamji.message" . }}'
        - name: "discord-warning"
          discord_configs:
            - webhook_url_file: /etc/alertmanager/secrets/alertmanager-discord/warning-webhook
              send_resolved: true
              title: '{{ template "discord.kkamji.title" . }}'
              message: '{{ template "discord.kkamji.message" . }}'
    # Discord 메시지 커스텀 템플릿. secret 에 .tmpl 로 들어가 config.templates 가 로드한다.
    # discord_configs.title -> embed title, message -> embed description 로 매핑되며
    # 링크는 Discord 마크다운([text](url))으로 렌더된다. tz/since/humanizeDuration 은
    # Alertmanager >= 0.27 필요 (현재 v0.28.1). content 는 기본값(빈 값) 유지 - embed 만 표시.
    # 제목이 alertname 을 이미 보여주므로(group_by 에 alertname 포함) 본문은
    # summary + target + 시간 + 액션 링크(Query/Logs/Silence)에 집중한다.
    templateFiles:
      kkamji-discord.tmpl: |-
        {{ define "discord.kkamji.title" -}}
        {{ if eq .Status "firing" }}[FIRING:{{ .Alerts.Firing | len }}]{{ else }}[RESOLVED]{{ end }} {{ .CommonLabels.alertname }}{{ if .CommonLabels.namespace }} ({{ .CommonLabels.namespace }}){{ end }}
        {{- end }}

        {{ define "discord.kkamji.message" -}}
        {{ $ext := .ExternalURL -}}
        {{ range .Alerts -}}
        `{{ .Labels.severity }}` {{ if .Annotations.summary }}{{ .Annotations.summary }}{{ else }}{{ .Labels.alertname }}{{ end }}
        {{- if and .Annotations.description (ne .Annotations.description .Annotations.summary) }}
        {{ .Annotations.description }}{{ end }}
        {{- if .Labels.pod }}
        Target: `{{ .Labels.namespace }}/{{ .Labels.pod }}`
        {{- else if .Labels.instance }}
        Target: `{{ .Labels.instance }}`{{ if .Labels.job }} (job `{{ .Labels.job }}`){{ end }}
        {{- else if .Labels.job }}
        Target: job `{{ .Labels.job }}`{{ if .Labels.service }} / svc `{{ .Labels.service }}`{{ end }}{{ if .Labels.namespace }} in `{{ .Labels.namespace }}`{{ end }}
        {{- else if .Labels.namespace }}
        Namespace: `{{ .Labels.namespace }}`{{ end }}
        {{- if eq .Status "firing" }}
        Started: {{ (.StartsAt | tz "Asia/Seoul").Format "01-02 15:04" }} KST ({{ humanizeDuration (since .StartsAt).Seconds }} ago)
        {{- else }}
        Duration: {{ humanizeDuration (.EndsAt.Sub .StartsAt).Seconds }} ({{ (.StartsAt | tz "Asia/Seoul").Format "01-02 15:04" }} ~ {{ (.EndsAt | tz "Asia/Seoul").Format "15:04" }} KST)
        {{- end }}
        {{ if .Annotations.runbook_url }}[Runbook]({{ .Annotations.runbook_url }}) · {{ end }}[Query]({{ .GeneratorURL }}){{ if .Labels.pod }} · [Logs](https://grafana.kkamji.net/explore?schemaVersion=1&orgId=1&panes={{ printf `{"a":{"datasource":"loki","queries":[{"refId":"A","expr":"{namespace=\"%s\", pod=\"%s\"}","datasource":{"type":"loki","uid":"loki"}}],"range":{"from":"now-3h","to":"now"}}}` .Labels.namespace .Labels.pod | urlquery }}){{ end }} · [Silence]({{ $ext }}/#/silences/new?filter={{ printf "{alertname=%q}" .Labels.alertname | urlquery }})

        {{ end }}
        {{- end }}
  grafana:
    admin:
      existingSecret: grafana-auth
      userKey: admin-user
      passwordKey: admin-password
    defaultDashboardsTimezone: browser # TimeZone 설정 (default: UTC)
    additionalDataSources:
      - name: Loki
        # Discord 알림의 Logs explore 딥링크가 uid 를 참조하므로 고정한다
        uid: loki
        type: loki
        access: proxy
        url: http://loki-gateway:80
        jsonData:
          timeout: 60
          maxLines: 1000
          httpHeaderName1: "X-Scope-OrgID"
        secureJsonData:
          httpHeaderValue1: "kube-rca"
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo.monitoring.svc.cluster.local:3200
        jsonData:
          httpMethod: GET
          serviceMap:
            datasourceUid: Prometheus
    sidecar:
      datasources:
        exemplarTraceIdDestinations:
          datasourceUid: tempo
          traceIdLabelName: trace_id
          urlDisplayLabel: View Trace
      dashboards:
        folderAnnotation: "grafana_folder"
        defaultFolderName: "Default Dashboard"
        provider:
          foldersFromFilesStructure: true
  prometheus:
    prometheusSpec:
      # 알림의 Query 링크(.GeneratorURL)가 외부 도메인을 가리키도록 설정
      externalUrl: https://prometheus.kkamji.net
      enableRemoteWriteReceiver: true
      additionalScrapeConfigs:
        # Hubble & Cilium Metric 수집을 위한 설정
        - job_name: "kubernetes-pods" ## Cilium
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: true
            # prometheus.io/path annotation 존중 (없으면 기본 /metrics).
            # envoy 류 pod 는 /stats/prometheus 를 쓰므로 이 매핑이 없으면 404 → up==0.
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
              action: replace
              regex: (.+)
              target_label: __metrics_path__
            - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: ${1}:${2}
              target_label: __address__
            # namespace/pod 라벨이 없으면 TargetDown 류 알림에서 어떤 pod 인지
            # 식별 불가 ("in  namespace" 빈 칸 문제) → up 시계열에 라벨을 입힌다
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: pod
        - job_name: "kubernetes-endpoints" ## Hubble
          scrape_interval: 30s
          kubernetes_sd_configs:
            - role: endpoints
          relabel_configs:
            - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
              action: keep
              regex: true
            - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
              action: replace
              target_label: __address__
              regex: (.+)(?::\d+);(\d+)
              replacement: $1:$2
        # Istio Envoy sidecar metrics
        - job_name: "envoy-stats"
          metrics_path: /stats/prometheus
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_container_port_name]
              action: keep
              regex: ".*-envoy-prom"
            - action: labelmap
              regex: __meta_kubernetes_pod_label_(.+)
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: pod
        # Istiod control plane metrics
        - job_name: "istiod"
          kubernetes_sd_configs:
            - role: endpoints
              namespaces:
                names:
                  - istio-system
          relabel_configs:
            - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
              action: keep
              regex: istiod;http-monitoring
            - action: labelmap
              regex: __meta_kubernetes_pod_label_(.+)
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: pod
      retention: 14d
  # CrashLoopBackOff 전용 알람을 복원한다 (이전에 disabled 였으나, pod 단위
  # crashloop 신호가 없으면 KubePodNotReady 등 간접 알람만 남아 추적이 어렵다).
  defaultRules: {}

  # 기본 TargetDown 은 job/namespace 단위 집계라 어떤 target 이 죽었는지 안 보인다.
  # per-target 룰을 추가하고, TargetDown 은 inhibit_rules 로 억제한다 (안전망으로 유지).
  # keep_firing_for 로 resolve 직후 재발화(flapping) 시 중복 알림을 막는다.
  additionalPrometheusRulesMap:
    kkamji-scrape-target:
      groups:
        - name: kkamji.scrape-target
          rules:
            - alert: ScrapeTargetDown
              expr: up == 0
              for: 5m
              keep_firing_for: 5m
              labels:
                severity: warning
              annotations:
                summary: 'Scrape target down ({{ $labels.job }})'
                description: '{{ if $labels.pod }}Pod {{ $labels.namespace }}/{{ $labels.pod }}{{ else }}Target {{ $labels.instance }}{{ end }} (job `{{ $labels.job }}`) has been unreachable for 5 minutes.'

  # Cilium kubeProxyReplacement 환경 - kube-proxy 가 없으므로 scrape 대상과
  # KubeProxyDown 룰 자체를 생성하지 않는다 (영구 firing 노이즈 제거).
  kubeProxy:
    enabled: false

basicAuth:
  ssmKey: /kkamji/monitoring/ingress/basic-auth
  # Envoy Gateway basic auth 용 {SHA} 형식 htpasswd (htpasswd -nbs 로 생성)
  shaSsmKey: /kkamji/monitoring/ingress/basic-auth-sha
  namespaces:
    - monitoring
    - kube-system

grafanaAuth:
  adminUserSsmKey: /kkamji/monitoring/grafana/admin-user
  adminPasswordSsmKey: /kkamji/monitoring/grafana/admin-password

# Alertmanager Discord webhooks (personal server). severity 로 critical / warning
# webhook 분기. ESO 가 SSM 의 webhook URL 을 monitoring ns 의 alertmanager-discord
# Secret(critical-webhook / warning-webhook) 으로 sync → webhook_url_file 로 mount.
alertmanagerDiscord:
  criticalSsmKey: /kkamji/monitoring/discord/alertmanager-critical-webhook
  warningSsmKey: /kkamji/monitoring/discord/alertmanager-warning-webhook

# Gateway API 라우트 (앱 차트 소유 원칙 - templates/gateway-routes.yaml).
# 플랫폼 Gateway 의 wildcard 리스너(sectionName: https)에 붙는다.
gatewayRef:
  name: kkamji
  namespace: envoy-gateway-system
  sectionName: https

gatewayRoutes:
  grafana:
    host: grafana.kkamji.net
    backend: { name: kube-prometheus-stack-grafana, port: 80 }
  prometheus:
    host: prometheus.kkamji.net
    backend: { name: kube-prometheus-stack-prometheus, port: 9090 }
    basicAuth: true
  alertmanager:
    host: alertmanager.kkamji.net
    backend: { name: kube-prometheus-stack-alertmanager, port: 9093 }
    basicAuth: true
