{{- with .Values.alertmanagerDiscord }}
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: alertmanager-discord-ces
spec:
  externalSecretName: alertmanager-discord-es
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: In
        values:
          - monitoring
  refreshTime: 1h
  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      name: parameter-store
      kind: ClusterSecretStore
    target:
      # ESO renders the complete source config and its Alertmanager template.
      name: alertmanager-discord-config
      creationPolicy: Owner
      template:
        engineVersion: v2
        data:
          alertmanager.yaml: |
            global:
              resolve_timeout: 5m
            templates:
              - /etc/alertmanager/config/kkamji-discord.tmpl
            route:
              receiver: "null"
              group_by: ["alertname", "namespace", "severity"]
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              routes:
                - receiver: "null"
                  matchers: [alertname = "Watchdog"]
                - receiver: "null"
                  matchers: [alertname = "KubeVersionMismatch"]
                - receiver: "discord-critical"
                  matchers: [severity = "critical"]
                  repeat_interval: 1h
                - receiver: "discord-warning"
                  matchers: [severity = "warning"]
                  repeat_interval: 12h
            inhibit_rules:
              - source_matchers: [alertname =~ "KubePodCrashLooping|KubePodNotReady|ScrapeTargetDown"]
                target_matchers: [alertname = "TargetDown"]
                equal: ["namespace"]
              - source_matchers: [alertname = "KubeNodeNotReady"]
                target_matchers: [severity = "warning"]
                equal: ["node"]
              - source_matchers: [severity = "critical"]
                target_matchers: [severity = "warning"]
                equal: ["alertname", "namespace"]
            receivers:
              - name: "null"
              - name: "discord-critical"
                discord_configs:
                  - webhook_url: "{{ `{{ .criticalWebhook }}` }}"
                    send_resolved: true
                    title: '{{ "{{" }} template "discord.kkamji.title" . }}'
                    message: '{{ "{{" }} template "discord.kkamji.message" . }}'
              - name: "discord-warning"
                discord_configs:
                  - webhook_url: "{{ `{{ .warningWebhook }}` }}"
                    send_resolved: true
                    title: '{{ "{{" }} template "discord.kkamji.title" . }}'
                    message: '{{ "{{" }} template "discord.kkamji.message" . }}'
          kkamji-discord.tmpl: |-
            {{ "{{" }} define "discord.kkamji.title" -}}
            {{ "{{" }} if eq .Status "firing" }}[FIRING:{{ "{{" }} .Alerts.Firing | len }}{{ "{{" }} else }}[RESOLVED]{{ "{{" }} end }} {{ "{{" }} .CommonLabels.alertname }}{{ "{{" }} if .CommonLabels.namespace }} ({{ "{{" }} .CommonLabels.namespace }}){{ "{{" }} end }}
            {{ "{{" }}- end }}

            {{ "{{" }} define "discord.kkamji.message" -}}
            {{ "{{" }} $ext := .ExternalURL -}}
            {{ "{{" }} range .Alerts -}}
            `{{ "{{" }} .Labels.severity }}` {{ "{{" }} if .Annotations.summary }}{{ "{{" }} .Annotations.summary }}{{ "{{" }} else }}{{ "{{" }} .Labels.alertname }}{{ "{{" }} end }}
            {{ "{{" }}- if and .Annotations.description (ne .Annotations.description .Annotations.summary) }}
            {{ "{{" }} .Annotations.description }}{{ "{{" }} end }}
            {{ "{{" }}- if .Labels.pod }}
            Target: `{{ "{{" }} .Labels.namespace }}/{{ "{{" }} .Labels.pod }}`
            {{ "{{" }}- else if .Labels.instance }}
            Target: `{{ "{{" }} .Labels.instance }}`{{ "{{" }} if .Labels.job }} (job `{{ "{{" }} .Labels.job }}`){{ "{{" }} end }}
            {{ "{{" }}- else if .Labels.job }}
            Target: job `{{ "{{" }} .Labels.job }}`{{ "{{" }} if .Labels.service }} / svc `{{ "{{" }} .Labels.service }}`{{ "{{" }} end }}{{ "{{" }} if .Labels.namespace }} in `{{ "{{" }} .Labels.namespace }}`{{ "{{" }} end }}
            {{ "{{" }}- else if .Labels.namespace }}
            Namespace: `{{ "{{" }} .Labels.namespace }}`{{ "{{" }} end }}
            {{ "{{" }}- if eq .Status "firing" }}
            Started: {{ "{{" }} (.StartsAt | tz "Asia/Seoul").Format "01-02 15:04" }} KST ({{ "{{" }} humanizeDuration (since .StartsAt).Seconds }} ago)
            {{ "{{" }}- else }}
            Duration: {{ "{{" }} humanizeDuration (.EndsAt.Sub .StartsAt).Seconds }} ({{ "{{" }} (.StartsAt | tz "Asia/Seoul").Format "01-02 15:04" }} ~ {{ "{{" }} (.EndsAt | tz "Asia/Seoul").Format "15:04" }} KST)
            {{ "{{" }}- end }}
            {{ "{{" }} if .Annotations.runbook_url }}[Runbook]({{ "{{" }} .Annotations.runbook_url }}) · {{ "{{" }} end }}[Query]({{ "{{" }} .GeneratorURL }}){{ "{{" }} if .Labels.pod }} · [Logs](https://grafana.kkamji.net/explore?schemaVersion=1&orgId=1&panes={{ "{{" }} printf `{"a":{"datasource":"loki","queries":[{"refId":"A","expr":"{namespace=\"%s\", pod=\"%s\"}","datasource":{"type":"loki","uid":"loki"}}],"range":{"from":"now-3h","to":"now"}}}` .Labels.namespace .Labels.pod | urlquery }}){{ "{{" }} end }} · [Silence]({{ "{{" }} $ext }}/#/silences/new?filter={{ "{{" }} printf "{alertname=%q}" .Labels.alertname | urlquery }})

            {{ "{{" }} end }}
            {{ "{{" }}- end }}
    data:
      - secretKey: criticalWebhook
        remoteRef:
          key: {{ .criticalSsmKey | quote }}
      - secretKey: warningWebhook
        remoteRef:
          key: {{ .warningSsmKey | quote }}
{{- end }}
