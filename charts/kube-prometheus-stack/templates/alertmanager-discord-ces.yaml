{{- with .Values.alertmanagerDiscord }}
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: alertmanager-discord-ces
spec:
  externalSecretName: alertmanager-discord-es
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: In
        values:
          - monitoring
  refreshTime: 1h
  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      name: parameter-store
      kind: ClusterSecretStore
    target:
      # ESO renders this complete source config from SecureStrings in-cluster.
      name: alertmanager-discord-config
      creationPolicy: Owner
      template:
        engineVersion: v2
        data:
          alertmanager.yaml: |
            global:
              resolve_timeout: 5m
            templates:
              - /etc/alertmanager/configmaps/alertmanager-discord-template/kkamji-discord.tmpl
            route:
              receiver: "null"
              group_by: ["alertname", "namespace", "severity"]
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              routes:
                - receiver: "null"
                  matchers: [alertname = "Watchdog"]
                - receiver: "null"
                  matchers: [alertname = "KubeVersionMismatch"]
                - receiver: "discord-critical"
                  matchers: [severity = "critical"]
                  repeat_interval: 1h
                - receiver: "discord-warning"
                  matchers: [severity = "warning"]
                  repeat_interval: 12h
            inhibit_rules:
              - source_matchers: [alertname =~ "KubePodCrashLooping|KubePodNotReady|ScrapeTargetDown"]
                target_matchers: [alertname = "TargetDown"]
                equal: ["namespace"]
              - source_matchers: [alertname = "KubeNodeNotReady"]
                target_matchers: [severity = "warning"]
                equal: ["node"]
              - source_matchers: [severity = "critical"]
                target_matchers: [severity = "warning"]
                equal: ["alertname", "namespace"]
            receivers:
              - name: "null"
              - name: "discord-critical"
                discord_configs:
                  - webhook_url: "{{ `{{ .criticalWebhook }}` }}"
                    send_resolved: true
                    title: '{{ `{{ printf "{{" }} template "discord.kkamji.title" . }}` }}'
                    message: '{{ `{{ printf "{{" }} template "discord.kkamji.message" . }}` }}'
              - name: "discord-warning"
                discord_configs:
                  - webhook_url: "{{ `{{ .warningWebhook }}` }}"
                    send_resolved: true
                    title: '{{ `{{ printf "{{" }} template "discord.kkamji.title" . }}` }}'
                    message: '{{ `{{ printf "{{" }} template "discord.kkamji.message" . }}` }}'
    data:
      - secretKey: criticalWebhook
        remoteRef:
          key: {{ .criticalSsmKey | quote }}
      - secretKey: warningWebhook
        remoteRef:
          key: {{ .warningSsmKey | quote }}
{{- end }}
