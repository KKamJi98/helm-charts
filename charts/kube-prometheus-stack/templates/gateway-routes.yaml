{{/*
모니터링 스택의 HTTPRoute - 앱 차트가 자기 라우팅을 소유한다 (Gateway API
persona model). 플랫폼 Gateway(charts/envoy-gateway)의 wildcard 리스너에
sectionName: https 로 붙는다. group/kind/weight 는 API server defaulting 과
일치시켜 ArgoCD diff 를 방지.
*/}}
{{- $root := . }}
{{- range $name, $r := .Values.gatewayRoutes }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $name }}
  namespace: {{ $root.Release.Namespace }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $root.Values.gatewayRef.name }}
      namespace: {{ $root.Values.gatewayRef.namespace }}
      sectionName: {{ $root.Values.gatewayRef.sectionName }}
  hostnames:
    - {{ $r.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ $r.backend.name }}
          port: {{ $r.backend.port }}
          weight: 1
{{- if $r.basicAuth }}
---
# Envoy Gateway basic auth ({SHA} htpasswd, basic-auth secret 의 .htpasswd 키)
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ $name }}-basic-auth
  namespace: {{ $root.Release.Namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ $name }}
  basicAuth:
    users:
      name: basic-auth
{{- end }}
{{- end }}
