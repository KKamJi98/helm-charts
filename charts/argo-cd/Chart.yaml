apiVersion: v2
name: argo-cd
description: KKamJi homelab ArgoCD umbrella (upstream argo-cd + AppProjects + root applications)
type: application
version: 0.1.0
appVersion: v3.2.0

dependencies:
  - name: argo-cd
    alias: argocd
    repository: https://argoproj.github.io/argo-helm
    version: 9.1.4
  - name: argo-projects
    repository: file://../argo-projects
    version: 0.1.0
    condition: argo-projects.enabled
  - name: argo-applications
    alias: root-applications
    repository: file://../argo-applications
    version: 0.1.0
    condition: root-applications.enabled
