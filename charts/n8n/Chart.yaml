apiVersion: v2
name: n8n
description: KKamJi homelab umbrella chart for n8n with official n8n, PostgreSQL, Valkey, ESO, and Gateway API.
type: application
version: 0.1.0
appVersion: "stable"
home: https://n8n.io
sources:
  - https://github.com/n8n-io/n8n-hosting/tree/main/charts/n8n
  - https://github.com/KKamJi98/helm-charts
keywords:
  - n8n
  - workflow-automation
  - automation
  - queue
  - valkey
  - postgres
dependencies:
  - name: n8n
    repository: file://charts/n8n
    version: 1.10.1
  - name: postgresql
    repository: https://charts.bitnami.com/bitnami
    version: 18.7.10
    condition: postgresql.enabled
  - name: valkey
    repository: https://charts.bitnami.com/bitnami
    version: 6.1.14
    condition: valkey.enabled
