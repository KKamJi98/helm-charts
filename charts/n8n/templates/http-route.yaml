{{- if .Values.httpRoute.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.httpRoute.name }}
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
    - {{ .Values.httpRoute.host | quote }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gatewayRef.name }}
      namespace: {{ .Values.gatewayRef.namespace }}
      sectionName: {{ .Values.gatewayRef.sectionName }}
  rules:
    # Production webhook/form traffic is handled by the dedicated webhook processor.
    - matches:
        - path:
            type: PathPrefix
            value: /webhook
        - path:
            type: PathPrefix
            value: /webhook-waiting
        - path:
            type: PathPrefix
            value: /form
        - path:
            type: PathPrefix
            value: /form-waiting
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.httpRoute.webhookService.name }}
          port: {{ .Values.httpRoute.webhookService.port }}
          weight: 1
    # UI/API/default traffic goes to the main n8n service.
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.httpRoute.mainService.name }}
          port: {{ .Values.httpRoute.mainService.port }}
          weight: 1
{{- end }}
