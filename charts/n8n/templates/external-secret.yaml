{{- $store := .Values.secretStoreRef -}}
{{- $refresh := .Values.externalSecrets.refreshInterval | default "1h" -}}
{{- $base := trimSuffix "/" .Values.ssm.basePath -}}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.coreSecretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store.name }}
    kind: {{ $store.kind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.externalSecrets.coreSecretName }}
    creationPolicy: Owner
    template:
      data:
        N8N_ENCRYPTION_KEY: '{{ "{{ .encryptionKey }}" }}'
        N8N_HOST: {{ .Values.httpRoute.host | quote }}
        N8N_PORT: "5678"
        N8N_PROTOCOL: https
  data:
    - secretKey: encryptionKey
      remoteRef:
        key: {{ printf "%s/encryption-key" $base }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.postgresqlSecretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store.name }}
    kind: {{ $store.kind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.externalSecrets.postgresqlSecretName }}
    creationPolicy: Owner
    template:
      data:
        password: '{{ "{{ .password }}" }}'
        postgres-password: '{{ "{{ .password }}" }}'
  data:
    - secretKey: password
      remoteRef:
        key: {{ printf "%s/postgresql-password" $base }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.valkeySecretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store.name }}
    kind: {{ $store.kind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.externalSecrets.valkeySecretName }}
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ printf "%s/valkey-password" $base }}
