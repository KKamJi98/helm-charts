# kkamji homelab override for the n8n umbrella chart.
# Official n8n chart is vendored at charts/n8n/charts/n8n.
# Secrets are synced from AWS SSM Parameter Store through ESO; no secret literals live in Git.

secretStoreRef:
  name: parameter-store
  kind: ClusterSecretStore

ssm:
  basePath: /kkamji/automation/n8n

externalSecrets:
  refreshInterval: 1h
  coreSecretName: n8n-core-auth
  postgresqlSecretName: n8n-postgresql-auth
  valkeySecretName: n8n-valkey-auth

gatewayRef:
  name: kkamji
  namespace: envoy-gateway-system
  sectionName: https

httpRoute:
  enabled: true
  name: n8n
  host: n8n.kkamji.net
  mainService:
    name: n8n-main
    port: 5678
  webhookService:
    name: n8n-webhook-processor
    port: 5678

n8n:
  fullnameOverride: n8n
  image:
    repository: docker.n8n.io/n8nio/n8n
    tag: "stable"
    pullPolicy: IfNotPresent
  queueMode:
    enabled: true
    workerReplicaCount: 1
    workerConcurrency: 10
  webhookProcessor:
    enabled: true
    replicaCount: 1
    disableProductionWebhooksOnMainProcess: true
  multiMain:
    enabled: false
  replicaCount: 1
  service:
    type: ClusterIP
    port: 5678
  ingress:
    enabled: false
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 8Gi
    storageClassName: local-path
  resources:
    main:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    worker:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    webhookProcessor:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  secretRefs:
    existingSecret: n8n-core-auth
  config:
    timezone: Asia/Seoul
    extraEnv:
      - name: N8N_SECURE_COOKIE
        value: "true"
  webhook:
    enabled: true
    url: https://n8n.kkamji.net
  database:
    type: postgresdb
    useExternal: true
    host: n8n-postgresql
    port: 5432
    database: n8n
    schema: public
    user: n8n
    passwordSecret:
      name: n8n-postgresql-auth
      key: password
    ssl:
      enabled: false
  redis:
    enabled: true
    useExternal: true
    host: n8n-valkey-primary
    port: 6379
    database: 0
    timeout: 10000
    tls: false
    passwordSecret:
      name: n8n-valkey-auth
      key: password
    healthCheck:
      enabled: false

postgresql:
  enabled: true
  fullnameOverride: n8n-postgresql
  architecture: standalone
  auth:
    username: n8n
    database: n8n
    existingSecret: n8n-postgresql-auth
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      storageClass: local-path
      size: 8Gi
    resourcesPreset: "none"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

valkey:
  enabled: true
  fullnameOverride: n8n-valkey
  architecture: standalone
  auth:
    enabled: true
    existingSecret: n8n-valkey-auth
    existingSecretPasswordKey: password
  primary:
    persistence:
      enabled: true
      storageClass: local-path
      size: 2Gi
    resourcesPreset: "none"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
