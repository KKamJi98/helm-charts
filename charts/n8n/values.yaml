# Default values for the kkamji n8n umbrella chart.
# Environment-specific settings live in kkamji_local_values.yaml.

secretStoreRef:
  name: parameter-store
  kind: ClusterSecretStore

ssm:
  basePath: /kkamji/automation/n8n

externalSecrets:
  refreshInterval: 1h
  coreSecretName: n8n-core-auth
  postgresqlSecretName: n8n-postgresql-auth
  valkeySecretName: n8n-valkey-auth

gatewayRef:
  name: kkamji
  namespace: envoy-gateway-system
  sectionName: https

httpRoute:
  enabled: true
  name: n8n
  host: n8n.kkamji.net
  mainService:
    name: n8n-main
    port: 5678
  webhookService:
    name: n8n-webhook-processor
    port: 5678

n8n:
  fullnameOverride: n8n
  ingress:
    enabled: false

postgresql:
  enabled: true

valkey:
  enabled: true
