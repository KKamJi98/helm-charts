replicaCount: 1

image:
  repository: ghcr.io/openclaw/openclaw
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 18789
  nodePort: ""

gateway:
  mode: "local"
  bind: "lan"   # Options: "loopback", "lan", "tailnet", "auto", "custom"
  auth:
    mode: "token"
    allowTailscale: false
    existingSecretName: ""
    existingSecretKey: ""
    generateSecret: true
    rateLimit:
      maxAttempts: 10
      windowMs: 60000
      lockoutMs: 300000
      exemptLoopback: true
  controlUi:
    enabled: true
    basePath: ""
    allowedOrigins: []
    dangerouslyAllowHostHeaderOriginFallback: false
  tailscale:
    mode: "off"
    resetOnExit: false

webSearch:
  enabled: false
  provider: "duckduckgo"
  searxng:
    baseUrl: ""
    categories: ""
    language: ""

# Additional top-level OpenClaw config overrides merged into openclaw.json
config: {}

secret:
  enabled: false
  name: openclaw-api-keys
  data: {}
    # claude-api-key: "your-api-key"
    # gemini-api-key: "your-api-key"

externalSecret:
  enabled: false
  apiVersion: external-secrets.io/v1
  refreshInterval: 1h
  secretStoreName: ""
  secretStoreKind: ClusterSecretStore
  remoteKey: ""
  targetSecretName: ""
  creationPolicy: Owner

envFromSecretName: "openclaw-api-keys"

envFromSecret: []
  # - name: ANTHROPIC_API_KEY
  #   secretKey: claude-api-key
  #   # secretName: my-other-secret  # optional per-entry override
  # - name: GEMINI_API_KEY
  #   secretKey: gemini-api-key

dataDir: "/home/node/.openclaw"   # mount path for PVC + config (adjust for custom image)

persistence:
  enabled: true
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi

strategy:
  type: Recreate

resources: {}
  # requests:
  #   cpu: 500m
  #   memory: 1Gi
  # limits:
  #   cpu: "2"
  #   memory: 4Gi

startupProbe:
  exec:
    command:
      - node
      - -e
      - "require('http').get('http://127.0.0.1:18789/healthz',r=>{process.exit(r.statusCode<400?0:1)}).on('error',()=>process.exit(1))"
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

livenessProbe:
  exec:
    command:
      - node
      - -e
      - "require('http').get('http://127.0.0.1:18789/healthz',r=>{process.exit(r.statusCode<400?0:1)}).on('error',()=>process.exit(1))"
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  exec:
    command:
      - node
      - -e
      - "require('http').get('http://127.0.0.1:18789/readyz',r=>{process.exit(r.statusCode<400?0:1)}).on('error',()=>process.exit(1))"
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

defaultAgentId: ""

agents: {}
  # devops:
  #   model: "anthropic/claude-sonnet-4-6"
  #   soul: |
  #     You are a DevOps engineer.

nodeSelector: {}

tolerations: []

affinity: {}
