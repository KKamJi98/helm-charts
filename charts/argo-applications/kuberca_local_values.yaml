destinationNamespace: argocd
destinationServer: https://kubernetes.default.svc
project: kuberca

syncPolicy:
  automated:
    prune: true
    selfHeal: true
  syncOptions:
    - CreateNamespace=true
    - ApplyOutOfSyncOnly=true
    - ServerSideApply=true

applications:
  bookinfo:
    enabled: true
    name: bookinfo
    project: kuberca
    destination:
      namespace: bookinfo
    syncPolicy:
      managedNamespaceMetadata:
        labels:
          istio-injection: enabled
    source:
      repoURL: https://github.com/KKamJi98/helm-charts.git
      targetRevision: main
      path: charts/bookinfo
      helm:
        valueFiles:
          - kuberca_local_values.yaml

  load-generator:
    enabled: true
    name: load-generator
    project: kuberca
    destination:
      namespace: bookinfo
    source:
      repoURL: https://github.com/KKamJi98/helm-charts.git
      targetRevision: main
      path: charts/load-generator

  chaos-mesh:
    enabled: true
    name: chaos-mesh
    project: kuberca
    destination:
      namespace: chaos-mesh
    ignoreDifferences:
      - group: admissionregistration.k8s.io
        kind: MutatingWebhookConfiguration
        name: chaos-mesh-mutation
        jqPathExpressions:
          - .webhooks[].clientConfig.caBundle
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
        name: chaos-mesh-validation
        jqPathExpressions:
          - .webhooks[].clientConfig.caBundle
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
        name: chaos-mesh-validation-auth
        jqPathExpressions:
          - .webhooks[].clientConfig.caBundle
      - kind: Secret
        name: chaos-mesh-webhook-certs
        jsonPointers:
          - /data
      - kind: Secret
        name: chaos-mesh-daemon-certs
        jsonPointers:
          - /data
      - kind: Secret
        name: chaos-mesh-daemon-client-certs
        jsonPointers:
          - /data
      - kind: Secret
        name: chaos-mesh-chaosd-client-certs
        jsonPointers:
          - /data
    source:
      repoURL: https://github.com/KKamJi98/helm-charts.git
      targetRevision: main
      path: charts/chaos-mesh
      helm:
        valueFiles:
          - kuberca_local_values.yaml

  kuberca-monitoring:
    enabled: true
    name: kuberca-monitoring
    project: kuberca
    destination:
      namespace: monitoring
    source:
      repoURL: https://github.com/KKamJi98/helm-charts.git
      targetRevision: main
      path: charts/kuberca-monitoring
      helm:
        valueFiles:
          - kuberca_local_values.yaml

  k8s-resources:
    enabled: true
    name: k8s-resources
    project: kuberca
    annotations:
      argocd.argoproj.io/sync-wave: "-1"
    destination:
      namespace: kube-rca
    source:
      repoURL: https://github.com/kube-rca/k8s-resources.git
      targetRevision: main
      path: external-secrets
      directory:
        recurse: true

  kube-rca:
    enabled: true
    name: kube-rca
    project: kuberca
    destination:
      namespace: kube-rca
    source:
      repoURL: https://github.com/kube-rca/kuberca.git
      targetRevision: main
      path: charts/kube-rca
      helm:
        valueFiles:
          - kube-rca-values.yaml
