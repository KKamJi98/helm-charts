destinationNamespace: argocd
destinationServer: https://kubernetes.default.svc
project: automation

syncPolicy:
  automated:
    prune: true
    selfHeal: true
  syncOptions:
    - CreateNamespace=true
    - ApplyOutOfSyncOnly=true
    - ServerSideApply=true

applications:
  n8n:
    enabled: true
    name: n8n
    project: automation
    destination:
      namespace: n8n
    source:
      repoURL: https://github.com/KKamJi98/helm-charts.git
      targetRevision: main
      path: charts/n8n
      helm:
        valueFiles:
          - kkamji_local_values.yaml

  openclaw:
    enabled: true
    name: openclaw
    project: automation
    destination:
      namespace: openclaw
    source:
      repoURL: https://github.com/KKamJi98/helm-charts.git
      targetRevision: main
      path: charts/openclaw
      helm:
        valueFiles:
          - kkamji_local_values.yaml
    # 차트의 gateway.auth.generateSecret 은 lookup 기반인데 ArgoCD repo-server 는
    # 클러스터 접근 없이 렌더하므로 매번 randAlphaNum 으로 새 토큰이 생성된다.
    # data diff 를 무시해 sync 마다 토큰이 rotate 되는 것을 막는다.
    syncPolicy:
      syncOptions:
        - RespectIgnoreDifferences=true
    ignoreDifferences:
      - kind: Secret
        name: openclaw-gateway-auth
        jsonPointers:
          - /data

  hermes-memory:
    enabled: true
    name: hermes-memory
    project: automation
    destination:
      namespace: hermes
    source:
      repoURL: https://github.com/KKamJi98/helm-charts.git
      targetRevision: main
      path: charts/hermes-memory
      helm:
        valueFiles:
          - kkamji_local_values.yaml
    # Temporary bootstrap mode: charts/hermes-memory generates the Qdrant API key
    # because this Hermes session cannot write SSM SecureString parameters.
    # Ignore Secret data drift so ArgoCD does not rotate the key every render.
    # Target mode is ESO/SSM at /kkamji/hermes/mem0/qdrant-api-key.
    syncPolicy:
      syncOptions:
        - RespectIgnoreDifferences=true
    ignoreDifferences:
      - kind: Secret
        name: hermes-memory-qdrant-auth
        jsonPointers:
          - /data
