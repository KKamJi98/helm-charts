destinationNamespace: argocd
destinationServer: https://kubernetes.default.svc
project: personal

syncPolicy:
  automated:
    prune: true
    selfHeal: true
  syncOptions:
    - CreateNamespace=true
    - ApplyOutOfSyncOnly=true
    - ServerSideApply=true

applications:
  real-life-rpg:
    enabled: true
    name: real-life-rpg
    annotations:
      # 전역 구독은 실패 계열만 받으므로, 배포 성공 알림은 워크로드 앱만 opt-in
      notifications.argoproj.io/subscribe.on-deployed.slack: C0B8D959UQP
    project: personal
    syncPolicy:
      retry:
        refresh: true
    destination:
      namespace: real-life-rpg
    source:
      repoURL: https://github.com/KKamJi98/real-life-rpg.git
      targetRevision: main
      path: helm/real-life-rpg
      helm:
        valueFiles:
          - values.yaml
  play-hub:
    enabled: false
    name: play-hub
    annotations:
      # 전역 구독은 실패 계열만 받으므로, 배포 성공 알림은 워크로드 앱만 opt-in.
      # Discord webhook service 는 url 이 채널을 고정하므로 recipient 값은 불필요("").
      notifications.argoproj.io/subscribe.on-deployed.discord: ""
    project: personal
    destination:
      namespace: play-hub
    source:
      repoURL: https://github.com/KKamJi98/play-hub.git
      targetRevision: main
      path: helm/play-hub
      helm:
        valueFiles:
          - values.yaml
          - values-prod.yaml
