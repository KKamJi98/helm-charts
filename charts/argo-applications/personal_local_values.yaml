destinationNamespace: argocd
destinationServer: https://kubernetes.default.svc
project: personal

syncPolicy:
  automated:
    prune: true
    selfHeal: true
  syncOptions:
    - CreateNamespace=true
    - ApplyOutOfSyncOnly=true
    - ServerSideApply=true

applications:
  play-hub:
    enabled: true
    name: play-hub
    annotations:
      # 전역 구독은 실패 계열만 받으므로, 배포 성공 알림은 워크로드 앱만 opt-in
      notifications.argoproj.io/subscribe.on-deployed.slack: C0B8D959UQP
    project: personal
    destination:
      namespace: play-hub
    source:
      repoURL: https://github.com/KKamJi98/play-hub.git
      targetRevision: main
      path: helm/play-hub
      helm:
        valueFiles:
          - values.yaml
          - values-prod.yaml
