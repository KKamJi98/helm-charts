destinationNamespace: argocd
destinationServer: https://kubernetes.default.svc
project: personal

syncPolicy:
  automated:
    prune: true
    selfHeal: true
  syncOptions:
    - CreateNamespace=true
    - ApplyOutOfSyncOnly=true
    - ServerSideApply=true

applications:
  play-hub:
    enabled: true
    name: play-hub
    project: personal
    destination:
      namespace: play-hub
    source:
      repoURL: https://github.com/KKamJi98/play-hub.git
      targetRevision: main
      path: helm/play-hub
      helm:
        valueFiles:
          - values.yaml
          - values-prod.yaml
