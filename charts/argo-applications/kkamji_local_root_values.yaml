destinationNamespace: argocd
destinationServer: https://kubernetes.default.svc
project: argocd

syncPolicy:
  automated:
    prune: true
    selfHeal: true
  syncOptions:
    - CreateNamespace=true
    - ApplyOutOfSyncOnly=true
    - ServerSideApply=true

# Meta-root: bootstraps two app-of-apps roots.
applications:
  local-root:
    enabled: true
    name: local-root
    project: argocd
    source:
      repoURL: https://github.com/KKamJi98/helm-charts.git
      targetRevision: main
      path: charts/argo-applications
      helm:
        valueFiles:
          - kkamji_local_values.yaml

  kuberca-root:
    enabled: true
    name: kuberca-root
    project: argocd
    source:
      repoURL: https://github.com/KKamJi98/helm-charts.git
      targetRevision: main
      path: charts/argo-applications
      helm:
        valueFiles:
          - kuberca_local_values.yaml
