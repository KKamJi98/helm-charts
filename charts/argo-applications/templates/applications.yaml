{{- $root := . -}}
{{- $defaultNamespace := default "argocd" .Values.destinationNamespace -}}
{{- $defaultServer := default "https://kubernetes.default.svc" .Values.destinationServer -}}
{{- $defaultProject := default "default" .Values.project -}}
{{- $defaultSyncPolicy := .Values.syncPolicy -}}
{{- range $appKey, $app := .Values.applications }}
{{- if or (not (hasKey $app "enabled")) $app.enabled }}
{{- $appNamespace := default $defaultNamespace $app.namespace -}}
{{- $destination := default dict $app.destination -}}
{{- $destNamespace := default $appNamespace (index $destination "namespace") }}
{{- $destServer := default $defaultServer (index $destination "server") }}
{{- $appName := default $appKey $app.name }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $appName }}
  namespace: {{ $appNamespace }}
  labels:
{{ include "argo-applications.labels" $root | nindent 4 }}
{{- with $app.labels }}
{{ toYaml . | nindent 4 }}
{{- end }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
{{- /* monorepo 최적화: 앱 path 와 무관한 커밋은 manifest 재생성/refresh 를 건너뛴다.
       app 별 annotations 로 override 가능. */}}
{{- $annotations := merge (deepCopy (default dict $app.annotations)) (dict "argocd.argoproj.io/manifest-generate-paths" ".") }}
  annotations:
{{ toYaml $annotations | nindent 4 }}
spec:
  project: {{ default $defaultProject $app.project }}
  destination:
    server: {{ $destServer }}
    namespace: {{ $destNamespace }}
  source:
{{ required (printf "applications.%s.source is required" $appKey) $app.source | toYaml | nindent 4 }}
{{- $syncPolicy := $defaultSyncPolicy }}
{{- if hasKey $app "syncPolicy" }}
  {{- if kindIs "map" $app.syncPolicy }}
    {{- $syncPolicy = merge (deepCopy (default dict $defaultSyncPolicy)) $app.syncPolicy }}
    {{- if hasKey $app.syncPolicy "syncOptions" }}
      {{- $defaultSyncOptions := default (list) (index (default dict $defaultSyncPolicy) "syncOptions") }}
      {{- $appSyncOptions := default (list) (index $app.syncPolicy "syncOptions") }}
      {{- $_ := set $syncPolicy "syncOptions" (uniq (concat $defaultSyncOptions $appSyncOptions)) }}
    {{- end }}
  {{- else }}
    {{- $syncPolicy = $app.syncPolicy }}
  {{- end }}
{{- end }}
{{- if $syncPolicy }}
  syncPolicy:
{{ toYaml $syncPolicy | nindent 4 }}
{{- end }}
{{- with $app.ignoreDifferences }}
  ignoreDifferences:
{{ toYaml . | nindent 4 }}
{{- end }}
---
{{- end }}
{{- end }}
