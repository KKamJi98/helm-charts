argocd:
  configs:
    cm:
      # ESO controller 가 admission/defaulting 으로 채워 ArgoCD diff 에서 OutOfSync 로 보이는
      # remoteRef/extract/find 의 default 필드들을 ignore. ClusterExternalSecret 은 spec 안에
      # externalSecretSpec 이 한 단계 nested 되어 있어 path 가 다르다.
      resource.customizations.ignoreDifferences.external-secrets.io_ExternalSecret: |
        jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.data[].remoteRef.nullBytePolicy
        - .spec.dataFrom[].extract.conversionStrategy
        - .spec.dataFrom[].extract.decodingStrategy
        - .spec.dataFrom[].extract.metadataPolicy
        - .spec.dataFrom[].extract.nullBytePolicy
        - .spec.dataFrom[].find.conversionStrategy
        - .spec.dataFrom[].find.decodingStrategy
        - .spec.dataFrom[].find.metadataPolicy
        - .spec.dataFrom[].find.nullBytePolicy
      resource.customizations.ignoreDifferences.external-secrets.io_ClusterExternalSecret: |
        jqPathExpressions:
        - .spec.externalSecretSpec.data[].remoteRef.conversionStrategy
        - .spec.externalSecretSpec.data[].remoteRef.decodingStrategy
        - .spec.externalSecretSpec.data[].remoteRef.metadataPolicy
        - .spec.externalSecretSpec.data[].remoteRef.nullBytePolicy
        - .spec.externalSecretSpec.dataFrom[].extract.conversionStrategy
        - .spec.externalSecretSpec.dataFrom[].extract.decodingStrategy
        - .spec.externalSecretSpec.dataFrom[].extract.metadataPolicy
        - .spec.externalSecretSpec.dataFrom[].extract.nullBytePolicy
        - .spec.externalSecretSpec.dataFrom[].find.conversionStrategy
        - .spec.externalSecretSpec.dataFrom[].find.decodingStrategy
        - .spec.externalSecretSpec.dataFrom[].find.metadataPolicy
        - .spec.externalSecretSpec.dataFrom[].find.nullBytePolicy

  global:
    domain: argocd.kkamji.net
  
  server:
    replicas: 1
    certificate:
      enabled: true
      issuer:
        group: cert-manager.io
        kind: ClusterIssuer
        name: letsencrypt-prod
    metrics:
      enabled: true
    # 외부 노출은 Envoy Gateway TLSRoute(charts/envoy-gateway)가 담당.
    # TLS 종료는 기존 ssl-passthrough 와 동일하게 argocd-server pod 가 직접 수행
    # (Certificate/argocd-server 는 server.certificate 가 계속 관리).
    extensions:
      enabled: true
      extensionList:
        - name: rollout-extension
          env:
            - name: EXTENSION_URL
              value: https://github.com/argoproj-labs/rollout-extension/releases/download/v0.3.7/extension.tar
  
  redis-ha:
    enabled: false
  
  controller:
    replicas: 1
  
  repoServer:
    replicas: 1
  
  applicationSet:
    replicas: 1
  
  notifications:
    enabled: true
    secret:
      create: false
      # Exteranl-Secrets에서 불러오도록 
      name: argocd-notifications-secret
      # secret name: argocd-notifications-secret
      # key: slack-token
      # value: {token}
  
      # items:
      #   slack-token: "My Token"
  
    notifiers:
      service.slack: |
        token: $slack-token
  
    subscriptions:
      # ArgoCD 전용 단일 채널. 채널 ID 로 지정해 rename 에 영향받지 않는다.
      # (00_monitor-critical / 00_monitor-warning 은 AlertManager 전용이므로 사용하지 않는다)
      - recipients:
          - slack:C0B8D959UQP  # 00_monitor-argocd
        triggers:
          - on-deployed
          - on-sync-failed
          - on-health-degraded
          - on-sync-status-unknown
    templates:
      template.app-deployed: |
        email:
          subject: New version of an application {{.app.metadata.name}} is up and running.
        message: |
          {{if eq .serviceType "slack"}}:white_check_mark:{{end}} Application {{.app.metadata.name}} is now running new version of deployments manifests.
        slack:
          attachments: |
            [{
              "title": "{{ .app.metadata.name}}",
              "title_link":"{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
              "color": "#18be52",
              "fields": [
              {
                "title": "Sync Status",
                "value": "{{.app.status.sync.status}}",
                "short": true
              },
              {
                "title": "Repository",
                "value": "{{.app.spec.source.repoURL}}",
                "short": true
              },
              {
                "title": "Revision",
                "value": "{{.app.status.sync.revision}}",
                "short": true
              }
              {{range $index, $c := .app.status.conditions}}
              {{if not $index}},{{end}}
              {{if $index}},{{end}}
              {
                "title": "{{$c.type}}",
                "value": "{{$c.message}}",
                "short": true
              }
              {{end}}
              ]
            }]
      template.app-health-degraded: |
        email:
          subject: Application {{.app.metadata.name}} has degraded.
        message: |
          {{if eq .serviceType "slack"}}<!here> :exclamation:{{end}} Application {{.app.metadata.name}} has degraded.
          Application details: {{.context.argocdUrl}}/applications/{{.app.metadata.name}}.
        slack:
          attachments: |-
            [{
              "title": "{{ .app.metadata.name}}",
              "title_link": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
              "color": "#f4c030",
              "fields": [
              {
                "title": "Sync Status",
                "value": "{{.app.status.sync.status}}",
                "short": true
              },
              {
                "title": "Repository",
                "value": "{{.app.spec.source.repoURL}}",
                "short": true
              }
              {{range $index, $c := .app.status.conditions}}
              {{if not $index}},{{end}}
              {{if $index}},{{end}}
              {
                "title": "{{$c.type}}",
                "value": "{{$c.message}}",
                "short": true
              }
              {{end}}
              ]
            }]
      template.app-sync-failed: |
        email:
          subject: Failed to sync application {{.app.metadata.name}}.
        message: |
          {{if eq .serviceType "slack"}}<!here> :exclamation:{{end}}  The sync operation of application {{.app.metadata.name}} has failed at {{.app.status.operationState.finishedAt}} with the following error: {{.app.status.operationState.message}}
          Sync operation details are available at: {{.context.argocdUrl}}/applications/{{.app.metadata.name}}?operation=true .
        slack:
          attachments: |-
            [{
              "title": "{{ .app.metadata.name}}",
              "title_link":"{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
              "color": "#E96D76",
              "fields": [
              {
                "title": "Sync Status",
                "value": "{{.app.status.sync.status}}",
                "short": true
              },
              {
                "title": "Repository",
                "value": "{{.app.spec.source.repoURL}}",
                "short": true
              }
              {{range $index, $c := .app.status.conditions}}
              {{if not $index}},{{end}}
              {{if $index}},{{end}}
              {
                "title": "{{$c.type}}",
                "value": "{{$c.message}}",
                "short": true
              }
              {{end}}
              ]
            }]
      template.app-sync-running: |
        email:
          subject: Start syncing application {{.app.metadata.name}}.
        message: |
          The sync operation of application {{.app.metadata.name}} has started at {{.app.status.operationState.startedAt}}.
          Sync operation details are available at: {{.context.argocdUrl}}/applications/{{.app.metadata.name}}?operation=true .
        slack:
          attachments: |-
            [{
              "title": "{{ .app.metadata.name}}",
              "title_link":"{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
              "color": "#0DADEA",
              "fields": [
              {
                "title": "Sync Status",
                "value": "{{.app.status.sync.status}}",
                "short": true
              },
              {
                "title": "Repository",
                "value": "{{.app.spec.source.repoURL}}",
                "short": true
              }
              {{range $index, $c := .app.status.conditions}}
              {{if not $index}},{{end}}
              {{if $index}},{{end}}
              {
                "title": "{{$c.type}}",
                "value": "{{$c.message}}",
                "short": true
              }
              {{end}}
              ]
            }]
      template.app-sync-status-unknown: |
        email:
          subject: Application {{.app.metadata.name}} sync status is 'Unknown'
        message: |
          {{if eq .serviceType "slack"}}:exclamation:{{end}} Application {{.app.metadata.name}} sync is 'Unknown'.
          Application details: {{.context.argocdUrl}}/applications/{{.app.metadata.name}}.
          {{if ne .serviceType "slack"}}
          {{range $c := .app.status.conditions}}
              * {{$c.message}}
          {{end}}
          {{end}}
        slack:
          attachments: |-
            [{
              "title": "{{ .app.metadata.name}}",
              "title_link":"{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
              "color": "#E96D76",
              "fields": [
              {
                "title": "Sync Status",
                "value": "{{.app.status.sync.status}}",
                "short": true
              },
              {
                "title": "Repository",
                "value": "{{.app.spec.source.repoURL}}",
                "short": true
              }
              {{range $index, $c := .app.status.conditions}}
              {{if not $index}},{{end}}
              {{if $index}},{{end}}
              {
                "title": "{{$c.type}}",
                "value": "{{$c.message}}",
                "short": true
              }
              {{end}}
              ]
            }]
      template.app-sync-succeeded: |
        email:
          subject: Application {{.app.metadata.name}} has been successfully synced.
        message: |
          {{if eq .serviceType "slack"}}:white_check_mark:{{end}} Application {{.app.metadata.name}} has been successfully synced at {{.app.status.operationState.finishedAt}}.
          Sync operation details are available at: {{.context.argocdUrl}}/applications/{{.app.metadata.name}}?operation=true .
        slack:
          attachments: |-
            [{
              "title": "{{ .app.metadata.name}}",
              "title_link":"{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
              "color": "#18be52",
              "fields": [
              {
                "title": "Sync Status",
                "value": "{{.app.status.sync.status}}",
                "short": true
              },
              {
                "title": "Repository",
                "value": "{{.app.spec.source.repoURL}}",
                "short": true
              }
              {{range $index, $c := .app.status.conditions}}
              {{if not $index}},{{end}}
              {{if $index}},{{end}}
              {
                "title": "{{$c.type}}",
                "value": "{{$c.message}}",
                "short": true
              }
              {{end}}
              ]
            }]
    triggers:
      trigger.on-deployed: |
        - description: Application is synced and healthy. Triggered once per commit.
          # mono-repo 환경에서는 sync.revision 대신 syncResult.revision 사용
          oncePer: app.status.operationState.syncResult.revision
          send:
          - app-deployed
          when: app.status.operationState != nil and app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
      trigger.on-health-degraded: |
        - description: Application has degraded
          send:
          - app-health-degraded
          when: app.status.health.status == 'Degraded'
      trigger.on-sync-failed: |
        - description: Application syncing has failed
          send:
          - app-sync-failed
          when: app.status.operationState != nil and app.status.operationState.phase in ['Error', 'Failed']
      trigger.on-sync-running: |
        - description: Application is being synced
          send:
          - app-sync-running
          when: app.status.operationState != nil and app.status.operationState.phase in ['Running']
      trigger.on-sync-status-unknown: |
        - description: Application status is 'Unknown'
          send:
          - app-sync-status-unknown
          when: app.status.sync.status == 'Unknown'
      # For more information: https://argo-cd.readthedocs.io/en/stable/operator-manual/notifications/triggers/#default-triggers
      defaultTriggers: |
        - on-sync-status-unknown

argo-projects:
  namespace: argocd
  
  projects:
    argocd:
      description: "ArgoCD self-management (argo-cd, argocd-projects, root-applications)"
      sourceRepos:
        - "*"
      destinations:
        - server: https://kubernetes.default.svc
          namespace: "*"
      clusterResourceWhitelist:
        - group: "*"
          kind: "*"
      namespaceResourceWhitelist:
        - group: "*"
          kind: "*"
  
    management:
      description: "Cluster management addons (CNI, ingress, observability, security)"
      sourceRepos:
        - "*"
      destinations:
        - server: https://kubernetes.default.svc
          namespace: "*"
      clusterResourceWhitelist:
        - group: "*"
          kind: "*"
      namespaceResourceWhitelist:
        - group: "*"
          kind: "*"
  
    automation:
      description: "Automation tooling (openclaw, etc.)"
      sourceRepos:
        - "*"
      destinations:
        - server: https://kubernetes.default.svc
          namespace: "*"
      clusterResourceWhitelist:
        - group: "*"
          kind: "*"
      namespaceResourceWhitelist:
        - group: "*"
          kind: "*"
  
    personal:
      description: "Personal projects (play-hub)"
      sourceRepos:
        - "*"
      destinations:
        - server: https://kubernetes.default.svc
          namespace: "*"
      clusterResourceWhitelist:
        - group: "*"
          kind: "*"
      namespaceResourceWhitelist:
        - group: "*"
          kind: "*"

rootApplications:
  enabled: true
  namespace: argocd
  project: argocd
  repoURL: https://github.com/KKamJi98/helm-charts.git
  targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true

  roots:
    management-root:
      valueFiles:
        - management_local_values.yaml
    automation-root:
      valueFiles:
        - automation_local_values.yaml
    personal-root:
      valueFiles:
        - personal_local_values.yaml

# Admin 비밀번호를 ESO 로 고정 (SSM 값은 bcrypt 해시).
# 재구성/부트스트랩 직후에도 initial-admin-secret 대신 지정 비밀번호로 수렴.
adminPassword:
  enabled: true
  ssmKey: /kkamji/argocd/admin-password-bcrypt

# Repo credentials via ESO. SSM parameters must be pre-populated.
# Single GitHub App registered with two installations (KKamJi98 + kube-rca).
# App ID + private key are shared; only installationID differs per prefix.
repoCredentials:
  github-app-creds-personal:
    enabled: true
    url: "https://github.com/KKamJi98/"
    refreshInterval: 1h0m0s
    secretStoreRef:
      name: parameter-store
      kind: ClusterSecretStore
    ssm:
      appID: /kkamji/argocd/github-app/app-id
      installationID: /kkamji/argocd/github-app/installation-id-personal
      privateKey: /kkamji/argocd/github-app/private-key

  github-app-creds-kuberca:
    enabled: true
    url: "https://github.com/kube-rca/"
    refreshInterval: 1h0m0s
    secretStoreRef:
      name: parameter-store
      kind: ClusterSecretStore
    ssm:
      appID: /kkamji/argocd/github-app/app-id
      installationID: /kkamji/argocd/github-app/installation-id-kuberca
      privateKey: /kkamji/argocd/github-app/private-key

# GitHub webhook secret. ESO 가 argocd-secret 에 webhook.github.secret 키만
# merge 로 추가 → repo push 즉시 ArgoCD sync 트리거 가능.
githubWebhook:
  enabled: true
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: parameter-store
    kind: ClusterSecretStore
  ssmKey: /kkamji/argocd/github-webhook/secret

# Slack bot token for argocd-notifications. ESO 가 argocd-notifications-secret 에
# slack-token 키를 sync (SSM 경로는 alertmanager 와 통일해 slack-bot-token).
slackToken:
  ssmKey: /kkamji/argocd/notifications/slack-bot-token
