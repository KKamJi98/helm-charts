{{- if .Values.rootApplications.enabled -}}
{{- $repoURL := required "rootApplications.repoURL is required" .Values.rootApplications.repoURL -}}
{{- $targetRevision := default "main" .Values.rootApplications.targetRevision -}}
{{- $namespace := default "argocd" .Values.rootApplications.namespace -}}
{{- $project := default "argocd" .Values.rootApplications.project -}}
{{- $defaultSyncPolicy := .Values.rootApplications.syncPolicy -}}
{{- range $name, $root := .Values.rootApplications.roots }}
{{- if or (not (hasKey $root "enabled")) $root.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $name }}
  namespace: {{ $namespace }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ default $project $root.project }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ $namespace }}
  source:
    repoURL: {{ default $repoURL $root.repoURL }}
    targetRevision: {{ default $targetRevision $root.targetRevision }}
    path: {{ default "charts/argo-applications" $root.path }}
    helm:
      valueFiles:
{{ toYaml $root.valueFiles | indent 8 }}
{{- $sp := default $defaultSyncPolicy $root.syncPolicy }}
{{- with $sp }}
  syncPolicy:
{{ toYaml . | indent 4 }}
{{- end }}
---
{{- end }}
{{- end }}
{{- end }}
