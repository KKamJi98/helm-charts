{{- with .Values.discordWebhook }}
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: discord-webhook-ces
spec:
  externalSecretName: discord-webhook-es
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: In
        values:
          - argocd
  refreshTime: 1h
  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      name: parameter-store
      kind: ClusterSecretStore
    target:
      name: argocd-notifications-secret
      creationPolicy: Owner
    data:
      # notifications-cm 의 service.webhook.discord.url 이 $argocd-notifications-webhook
      # 변수로 이 키를 참조한다 (notifications-engine 이 secret 값으로 치환).
      - secretKey: argocd-notifications-webhook
        remoteRef:
          key: {{ .ssmKey | quote }}
{{- end }}
