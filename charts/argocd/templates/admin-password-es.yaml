{{/*
ArgoCD admin 비밀번호를 SSM 에서 ESO 로 주입한다.
- SSM 값은 bcrypt 해시 (생성: htpasswd -nbBC 10 "" '<pw>' | tr -d ':\n')
- creationPolicy: Merge -> chart/argocd-server 가 관리하는 argocd-secret 의
  다른 키(server.secretkey, tls 등)는 건드리지 않고 admin.password 만 병합.
  부트스트랩/재구성 직후에도 ESO refresh 가 항상 지정 비밀번호로 수렴시킨다.
*/}}
{{- with .Values.adminPassword }}
{{- if .enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-admin-password-es
  namespace: {{ $.Release.Namespace }}
spec:
  refreshInterval: {{ .refreshInterval | default "1h" }}
  secretStoreRef:
    name: parameter-store
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
    deletionPolicy: Merge
  data:
    - secretKey: admin.password
      remoteRef:
        key: {{ .ssmKey | quote }}
{{- end }}
{{- end }}
