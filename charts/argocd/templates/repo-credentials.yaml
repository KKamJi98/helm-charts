{{/*
Repo credentials managed via External Secrets Operator (ESO).
Pulls GitHub App credentials from a SecretStore (default: parameter-store
ClusterSecretStore) and writes ArgoCD-compatible 'repo-creds' Secrets so
that ArgoCD can authenticate to GitHub via App installation tokens.
*/}}
{{- range $name, $cred := .Values.repoCredentials }}
{{- if $cred.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
spec:
  refreshInterval: {{ $cred.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ $cred.secretStoreRef.name | default "parameter-store" }}
    kind: {{ $cred.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ $name }}
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repo-creds
      data:
        type: "git"
        url: {{ $cred.url | quote }}
        githubAppID: "{{ `{{ .appID }}` }}"
        githubAppInstallationID: "{{ `{{ .installationID }}` }}"
        githubAppPrivateKey: "{{ `{{ .privateKey }}` }}"
  data:
    - secretKey: appID
      remoteRef:
        key: {{ $cred.ssm.appID | quote }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: installationID
      remoteRef:
        key: {{ $cred.ssm.installationID | quote }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: privateKey
      remoteRef:
        key: {{ $cred.ssm.privateKey | quote }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
{{- end }}
{{- end }}
