{{/*
GitHub webhook secret injected into argocd-secret via ESO merge.

argocd-secret 은 upstream argo-cd chart 가 이미 만들고 있으며 admin
password, server.secretkey 같은 chart-managed 키를 보유한다. 우리는
그 secret 에 webhook.github.secret 키만 ESO 로 추가한다.

- creationPolicy: Merge   → 기존 secret 의 chart-managed 키 보존
- deletionPolicy: Retain  → ExternalSecret 삭제 시 argocd-secret 자체는 유지
- ArgoCD 는 argocd-secret 변경을 자동 감지 → pod 재시작 불필요
*/}}
{{- if .Values.githubWebhook.enabled -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-github-webhook
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.githubWebhook.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.githubWebhook.secretStoreRef.name | default "parameter-store" }}
    kind: {{ .Values.githubWebhook.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: argocd-secret
    creationPolicy: Merge
    deletionPolicy: Retain
  data:
    - secretKey: webhook.github.secret
      remoteRef:
        key: {{ .Values.githubWebhook.ssmKey | quote }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
{{- end }}
