external-dns:
  provider:
    name: aws
  # Gateway API 라우트도 DNS 소스로 추가 (Envoy Gateway 전환).
  # ingress 는 Stage C(ingress-nginx 제거) 전까지 병행 유지.
  sources:
    - service
    - ingress
    - gateway-httproute
    - gateway-tlsroute
  domainFilters:
    - kkamji.net
  policy: upsert-only
  registry: txt
  txtOwnerId: kkamji-local-cluster

  aws:
    zoneType: public          # public / private
    region: ap-northeast-2

  env:                         # extraEnv 대신 env 사용
    - name: AWS_REGION
      value: ap-northeast-2
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: external-dns-aws
          key: AWS_ACCESS_KEY_ID
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: external-dns-aws
          key: AWS_SECRET_ACCESS_KEY

# external-dns-aws Secret을 SSM ParameterStore(SecureString JSON)에서 생성
externalSecret:
  enabled: true
  targetSecretName: external-dns-aws
  ssmKey: /kkamji/external-dns/aws-credentials
  refreshInterval: 1h
  secretStoreRef:
    name: parameter-store
    kind: ClusterSecretStore
