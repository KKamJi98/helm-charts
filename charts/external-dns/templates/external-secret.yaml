{{- with .Values.externalSecret }}
{{- if .enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-aws-es
  namespace: {{ $.Release.Namespace }}
spec:
  refreshInterval: {{ .refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .secretStoreRef.name | default "parameter-store" }}
    kind: {{ .secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ .targetSecretName | default "external-dns-aws" }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .ssmKey | quote }}
{{- end }}
{{- end }}
