# external-dns umbrella values
# upstream external-dns subchart 값은 external-dns: 키 밑에 둔다 (env values에서 override).
external-dns: {}

# external-dns Route53 자격증명을 SSM ParameterStore(SecureString JSON)에서 받아와
# external-dns-aws Secret으로 생성하는 ExternalSecret 설정.
# 기본 비활성 - self-managed 클러스터의 env values에서만 활성화한다 (EKS는 IRSA 사용).
externalSecret:
  enabled: false
  # targetSecretName: external-dns-aws             # 생성할 Secret (deployment의 secretKeyRef와 일치)
  # ssmKey: /kkamji/external-dns/aws-credentials    # SecureString 파라미터 경로 (JSON 값)
  # refreshInterval: 1h
  # secretStoreRef:
  #   name: parameter-store
  #   kind: ClusterSecretStore
