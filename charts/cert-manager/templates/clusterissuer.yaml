{{- with .Values.issuer }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .name }}
  annotations:
    argocd.argoproj.io/sync-wave: "10"   # cert-manager controller/webhook Ready 후 적용
spec:
  acme:
    email: {{ .email | quote }}
    server: {{ .server | quote }}
    privateKeySecretRef:
      name: {{ .privateKeySecretName }}
    solvers:
      # DNS-01 (Route53): wildcard(*.kkamji.net) 인증서 발급 가능, solver pod 불필요.
      # 자격증명은 templates/aws-credentials-es.yaml 이 SSM 에서 sync.
      - dns01:
          route53:
            region: {{ .route53.region }}
            hostedZoneID: {{ .route53.hostedZoneID }}
            accessKeyIDSecretRef:
              name: cert-manager-aws
              key: AWS_ACCESS_KEY_ID
            secretAccessKeySecretRef:
              name: cert-manager-aws
              key: AWS_SECRET_ACCESS_KEY
{{- end }}
