{{- with .Values.issuer }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .name }}
  annotations:
    argocd.argoproj.io/sync-wave: "10"   # cert-manager controller/webhook Ready 후 적용
spec:
  acme:
    email: {{ .email | quote }}
    server: {{ .server | quote }}
    privateKeySecretRef:
      name: {{ .privateKeySecretName }}
    solvers:
      - http01:
          # Envoy Gateway 전환: HTTP-01 챌린지를 Gateway(:80) HTTPRoute 로 해결
          gatewayHTTPRoute:
            parentRefs:
              - group: gateway.networking.k8s.io
                kind: Gateway
                name: {{ .gatewayName }}
                namespace: {{ .gatewayNamespace }}
            podTemplate:
              metadata:
                annotations:
{{ toYaml .solverPodAnnotations | indent 18 }}
{{- end }}
