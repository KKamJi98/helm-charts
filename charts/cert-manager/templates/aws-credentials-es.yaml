{{/*
DNS-01 (Route53) solver 용 자격증명. SSM SecureString JSON
(AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY) 을 cert-manager ns 의
Secret 으로 sync 한다 (external-dns 와 동일 패턴, IAM user 는 분리).
*/}}
{{- with .Values.awsCredentials }}
{{- if .enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cert-manager-aws-es
  namespace: {{ $.Release.Namespace }}
spec:
  refreshInterval: {{ .refreshInterval | default "1h" }}
  secretStoreRef:
    name: parameter-store
    kind: ClusterSecretStore
  target:
    name: {{ .targetSecretName | default "cert-manager-aws" }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .ssmKey | quote }}
{{- end }}
{{- end }}
