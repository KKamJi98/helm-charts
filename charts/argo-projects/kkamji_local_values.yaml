namespace: argocd

projects:
  argocd:
    description: "ArgoCD self-management (argo-cd, argocd-projects, root-applications)"
    sourceRepos:
      - "*"
    destinations:
      - server: https://kubernetes.default.svc
        namespace: "*"
    clusterResourceWhitelist:
      - group: "*"
        kind: "*"
    namespaceResourceWhitelist:
      - group: "*"
        kind: "*"

