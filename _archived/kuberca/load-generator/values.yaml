replicaCount: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60

image:
  repository: grafana/k6
  tag: "0.52.0"
  pullPolicy: IfNotPresent

# Target configuration
target:
  baseUrl: "http://productpage.bookinfo.svc.cluster.local:9080"
  detailsBaseUrl: "http://details.bookinfo.svc.cluster.local:9080"
  ratingsBaseUrl: "http://ratings.bookinfo.svc.cluster.local:9080"
  weights:
    productpage: 60
    details: 20
    ratings: 20
  rps: 60
  duration: "1h" # 1 hour per cycle (wrapper restarts k6 to release accumulated metric heap)
  prefix: ""
  preAllocatedVUs: 60
  maxVUs: 200

resources:
  limits:
    cpu: "500m"
    memory: 512Mi
  requests:
    cpu: 125m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}
